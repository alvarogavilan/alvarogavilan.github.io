function botTxt(a) {
  if(a.type==='arb' && a.arbDetails){
    var d = a.arbDetails;
    if (d.isMiddle) {
      var equalStake = (BANKROLL*0.05); // 5% banca repartido a partes iguales, riesgo real
      return 'CONSIDERAR — Apuesta <strong style="color:var(--value)">'+(equalStake/2).toFixed(2)+'€</strong> en '+d.bookA+' a "'+d.outcomeA+'" y <strong style="color:var(--value)">'+(equalStake/2).toFixed(2)+'€</strong> en '+d.bookB+' a "'+d.outcomeB+'". Si el resultado cae en el hueco, ganas el doble. Si no, pierdes solo una de las dos — <strong>esto NO es beneficio garantizado</strong>, es una apuesta de riesgo limitado con recompensa extra.';
    }
    var stakes = calcArbStakes(d.oddsA, d.oddsB, BANKROLL*0.1);
    return 'EJECUTAR — Apuesta <strong style="color:var(--value)">'+stakes.stakeA.toFixed(2)+'€</strong> en '+d.bookA+' a "'+d.outcomeA+'" y <strong style="color:var(--value)">'+stakes.stakeB.toFixed(2)+'€</strong> en '+d.bookB+' a "'+d.outcomeB+'". Ganas <strong style="color:var(--value)">'+stakes.profit.toFixed(2)+'€</strong> sin importar el resultado. Actúa rápido, estas discrepancias se corrigen en minutos.';
  }
  if(a.suspended){
    var marketTxtSusp = a.market ? ' ("'+a.market+'")' : '';
    return 'VIGILAR — '+a.book+' ha retirado esta cuota temporalmente'+marketTxtSusp+'. No se puede apostar hasta que reaparezca. Cuando vuelva, compara la nueva cuota con la anterior ('+a.from+') para ver si subió o bajó — eso te dirá hacia qué lado se movió el dinero grande.';
  }
  if(a.type==='sharp'){var c=parseFloat(a.chg||0);
    var bookName = a.coordinated ? 'Bet365 Y Winamax' : (a.book || 'tu casa');
    var stakeInfo = calcStake(parseFloat(a.to), parseFloat(a.to)*0.95);
    var marketTxtSharp = a.market ? ' a "'+a.market+'"' : '';
    var stakeTxt = stakeInfo ? ' <strong style="color:var(--value)">Apuesta sugerida: '+stakeInfo.stake.toFixed(0)+'€</strong> ('+stakeInfo.pct.toFixed(1)+'% de tu banca) en '+bookName+marketTxtSharp+'.' : '';
    if(a.coordinated) return 'EJECUTAR AHORA — Movimiento coordinado del '+c.toFixed(1)+'% en ambas casas a la vez. Esto es más fiable que un movimiento aislado: indica que el mercado entero está corrigiendo, no solo una casa.'+stakeTxt;
    if(c>15) return 'EJECUTAR AHORA — Caída del '+c+'% en '+bookName+' es señal sharp muy fuerte. Como haría Walters: actúa inmediatamente antes de que la cuota siga bajando.'+stakeTxt;

// Calcula cómo repartir tu banca entre las dos apuestas de arbitraje para que
// el beneficio sea EXACTAMENTE el mismo sin importar qué resultado ocurra.
function calcArbStakes(oddsA, oddsB, totalStake) {
  // Stake en A proporcional a 1/oddsA respecto a la suma de probabilidades implícitas
  var impliedA = 1/oddsA, impliedB = 1/oddsB;
  var sum = impliedA + impliedB;
  var stakeA = totalStake * (impliedA/sum);
  var stakeB = totalStake * (impliedB/sum);
  var profitIfA = stakeA*oddsA - totalStake;
  var profitIfB = stakeB*oddsB - totalStake;
  return {stakeA:stakeA, stakeB:stakeB, profit:(profitIfA+profitIfB)/2};
}

// ── CONTROLS ──────────────────────────────────────────────
function forceRefresh() {
  addDiag('Manual refresh triggered');
  FETCH_RUNNING = false;
  LOADING = false;
  Object.keys(lastFetch).forEach(function(k){lastFetch[k]=0;});
  setPulse('loading');
  renderPage();
  setTimeout(runFetch, 100);
}
function resetCounters() {
  if (confirm('¿Resetear contadores? Solo al inicio del mes.')) {
    Object.keys(REQ).forEach(function(k){REQ[k]=0;}); saveReq(); renderPage();
  }
}
function borrarHistorialPicks() {
  if (confirm('¿Borrar todo el historial de picks guardado en este dispositivo? Esto no se puede deshacer.')) {
    PICK_LOG = [];
    try { localStorage.removeItem('smp_picklog'); } catch(e) {}
    renderPage();
  }
}

// ── PULSE + TIMER ─────────────────────────────────────────
function setPulse(state) {
  var dot=document.getElementById('pdot'); var txt=document.getElementById('ptxt');
  if(!dot||!txt) return;
  dot.className='pdot '+state;
  if(state==='live') txt.textContent='En vivo · '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  else if(state==='loading') txt.textContent='Actualizando...';
  else {
    var le=ERRORS.length?ERRORS[ERRORS.length-1]:null;
    txt.textContent=le&&le.code?'Error HTTP '+le.code:le&&le.msg?'Error: '+le.msg.substring(0,20):'Error de conexión';
  }
}
function updateBadge() {
  var el=document.getElementById('ab'); if(el) el.textContent=ALERTS.length;
  // Badge API: pone un número en el icono de la app en pantalla de inicio (solo PWA instalada)
  if ('setAppBadge' in navigator) {
    try {
      if (ALERTS.length > 0) navigator.setAppBadge(ALERTS.length).catch(function(){});
      else navigator.clearAppBadge().catch(function(){});
    } catch(e) {}
  }
}

var T_START=Date.now(); var T_INT=50000;
setInterval(function() {
  var el=Date.now()-T_START;
  var fill=document.getElementById('tfill');
  if(fill) fill.style.width=Math.max(0,100-(el/T_INT)*100)+'%';
  var txt=document.getElementById('ptxt');
  if(txt&&LAST_UP&&document.getElementById('pdot').classList.contains('live'))
    txt.textContent='En vivo · '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(el>=T_INT){ T_START=Date.now(); runFetch(); }
}, 1000);

function guardarClavesPropias() {
  var statusEl = document.getElementById('keysStatus');
  var newKeys = {
    theOdds:  document.getElementById('cfgTheOdds').value.trim(),
    oddsApi:  document.getElementById('cfgOddsApi').value.trim(),
    oddsPapi: document.getElementById('cfgOddsPapi').value.trim(),
    sgo:      document.getElementById('cfgSgo').value.trim(),
    sharpApi: document.getElementById('cfgSharpApi').value.trim(), // opcional, puede quedar vacío
  };
  var newWorkerUrl = document.getElementById('cfgWorker').value.trim();

  if (!newWorkerUrl || !newKeys.theOdds || !newKeys.oddsApi || !newKeys.oddsPapi || !newKeys.sgo) {
    if (statusEl) { statusEl.innerHTML = '⚠️ Los 4 campos principales son obligatorios (SharpAPI es opcional).'; statusEl.style.color = 'var(--warn)'; }
    return;
  }

  saveKeys(newKeys);
  saveWorkerUrl(newWorkerUrl);
  if (statusEl) { statusEl.innerHTML = '✅ Guardado. Recargando para aplicar tus claves...'; statusEl.style.color = 'var(--value)'; }
  setTimeout(function(){ location.reload(); }, 1200);
}

async function activarNotificaciones() {
  var statusEl = document.getElementById('notifStatus');
  if (!statusEl) return;

  // Comprobación 1: ¿está la app instalada en pantalla de inicio? (requisito de Apple)
  var isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  if (!isStandalone) {
    statusEl.innerHTML = '⚠️ Primero añade esta app a tu pantalla de inicio (Compartir → Añadir a pantalla de inicio) y ábrela desde ahí. iOS lo exige antes de poder activar notificaciones.';
    statusEl.style.color = 'var(--warn)';
    return;
  }

  if (typeof OneSignal === 'undefined') {
    statusEl.innerHTML = '❌ El script de OneSignal no ha cargado. Revisa tu conexión a internet y vuelve a intentarlo. Si persiste tras varios intentos, puede ser un bloqueo de red.';
    statusEl.style.color = 'var(--sharp)';
    return;
  }

  if (!window._oneSignalReady) {
    // Damos una segunda oportunidad esperando hasta 8s antes de reportar fallo real
    statusEl.innerHTML = '⏳ Inicializando, espera 8 segundos...';
    statusEl.style.color = 'var(--muted)';
    var waited = 0;
    while (!window._oneSignalReady && waited < 8000) {
      await new Promise(function(r){ setTimeout(r, 500); });
      waited += 500;
    }
    if (!window._oneSignalReady) {
      statusEl.innerHTML = '❌ El sistema de notificaciones no terminó de inicializar tras 8s. Esto suele indicar un problema con el Service Worker (archivo OneSignalSDKWorker.js) o con la cuenta de OneSignal. Vuelve a intentarlo o avísame con este mensaje.';
      statusEl.style.color = 'var(--sharp)';
      return;
    }
  }

  try {
    await OneSignal.User.PushSubscription.optIn();
    var isSubscribed = OneSignal.User.PushSubscription.optedIn;
    if (isSubscribed) {
      statusEl.innerHTML = '✅ Notificaciones activadas. Recibirás avisos de movimientos masivos y arbitrajes.';
      statusEl.style.color = 'var(--value)';
    } else {
      statusEl.innerHTML = '❌ Permiso denegado. Ve a Ajustes del iPhone → Smart Money → Notificaciones para activarlo manualmente.';
      statusEl.style.color = 'var(--sharp)';
    }
  } catch(e) {
    statusEl.innerHTML = '❌ Error: '+e.message.substring(0,80);
    statusEl.style.color = 'var(--sharp)';
  }
}

function init() {
  addDiag('App iniciada · '+new Date().toLocaleTimeString('es-ES'));
  addDiag('Worker: '+(WORKER_URL && WORKER_URL!=='YOUR-WORKER-URL' ? WORKER_URL : 'NO CONFIGURADO'));
  var bi = document.getElementById('bankroll-input');
  if (bi) bi.value = BANKROLL;
  renderPage();
  setTimeout(function() {
    runFetch();
  }, 500);
}

// Fire on both events to handle iOS Safari quirks
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  // Already loaded
  init();
}
