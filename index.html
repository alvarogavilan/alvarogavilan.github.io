// ============================================================

// ============================================================

var DEFAULT_KEYS = {
  theOdds:  '8682d02fa435e17e5b531b5c8631bd0f',
  oddsApi:  '54a869df6080c65fd4230946cb8db844f34fd41a3db8c48602864eacf5a22af3',

// ── BANKROLL (gestión de stake) ───────────────────────────
var BANKROLL = parseFloat(localStorage.getItem('smp_bankroll')) || 350;
var KELLY_FRACTION = 0.25; // Kelly fraccionado al 25% — mucho más seguro que Kelly completo

function setBankroll(val) {
  val = parseFloat(val);
  if (!val || val<=0) return;
  BANKROLL = val;
  try { localStorage.setItem('smp_bankroll', BANKROLL); } catch(e){}
  renderPage();
}

// Kelly Criterion: f* = (bp - q) / b
// b = cuota decimal - 1 (ganancia neta por unidad apostada)
// p = probabilidad real estimada de ganar (derivada de la cuota de Pinnacle, la sharp)
// q = 1 - p
function calcStake(oddsBet365, oddsPinnacle) {
  if (!oddsBet365 || !oddsPinnacle || oddsBet365<=1 || oddsPinnacle<=1) return null;
  var pTrue = 1 / oddsPinnacle; // Pinnacle como estimación de probabilidad real (sin margen propio, aproximado)
  var b = oddsBet365 - 1;
  var q = 1 - pTrue;
  var kelly = (b*pTrue - q) / b;
  if (kelly <= 0) return null;
  var fraction = kelly * KELLY_FRACTION;
  var stake = BANKROLL * fraction;
  // Cap de seguridad: nunca más del 5% de la banca en una sola apuesta, ni menos de 1€
  stake = Math.min(stake, BANKROLL*0.05);
  stake = Math.max(stake, 1);
  return {stake: stake, pct: (stake/BANKROLL*100), kellyFull: kelly*100};
}

function saveReq(){ try{localStorage.setItem('smp_req',JSON.stringify(REQ));}catch(e){} }

var INTERVALS = {theOdds:7200000, oddsApi:720000, oddsPapi:600000, sgo:900000, sharpApi:90000, oddsPapiEsports:122040000};
var lastFetch  = {theOdds:0, oddsApi:0, oddsPapi:0, sgo:0, sharpApi:0, oddsPapiEsports:0};

var PAGE    = 'alerts';

var SHARP   = [];
var VALUEB  = [];

// ── REGISTRO HISTÓRICO DE PICKS (para Closing Line Value real) ──
// Esto es lo que las herramientas profesionales (OddsJam, RebelBetting) tienen
// y nosotros no teníamos: memoria de cada pick mostrado, para poder demostrar
// con datos propios si el sistema realmente genera valor a largo plazo.
var PICK_LOG = JSON.parse(localStorage.getItem('smp_picklog')||'[]');
function savePickLog() {
  try {
    // Limitar a 500 picks más recientes para no saturar localStorage
    if (PICK_LOG.length > 500) PICK_LOG = PICK_LOG.slice(-500);
    localStorage.setItem('smp_picklog', JSON.stringify(PICK_LOG));
  } catch(e) {}
}

// Registra un pick EV+ la primera vez que se ve, con su cuota inicial.
// Si ya existe (mismo key), actualiza la "última cuota vista" para poder
// calcular CLV cuando el evento empiece (closing line = última cuota antes del K.O.)
function logPick(pickKey, data) {
  var existing = PICK_LOG.find(function(p){ return p.key===pickKey; });
  if (existing) {
    existing.lastOdds = data.odds;
    existing.lastSeen = Date.now();
    existing.timesSeen = (existing.timesSeen||1) + 1;
  } else {
    PICK_LOG.push({
      key: pickKey, sport: data.sport, match: data.match, market: data.market,
      book: data.book, openOdds: data.odds, lastOdds: data.odds, pinnacleAtOpen: data.pinnacle,
      evAtOpen: data.ev, ko: data.ko, firstSeen: Date.now(), lastSeen: Date.now(), timesSeen: 1
    });
  }
  savePickLog();
}

// Calcula el CLV real de un pick: ¿la cuota subió o bajó desde que lo vimos
// hasta la última vez que tuvimos datos? Si bajó (para el lado que apostarías),
// significa que el mercado confirmó que tu pick tenía razón.
function calcCLV(pick) {
  if (!pick.openOdds || !pick.lastOdds || pick.openOdds===pick.lastOdds) return null;
  var clv = ((pick.openOdds - pick.lastOdds) / pick.openOdds) * 100;
  return clv; // positivo = la cuota bajó tras detectarlo = el mercado confirmó tu valor
}

var LOADING = false;
var LAST_UP = 0;
var ERRORS  = [];

// ── CORS PROXY ────────────────────────────────────────────
// Tu Cloudflare Worker personal — 100k req/día gratis, fiable
// Reemplaza YOUR-WORKER-URL con la URL que te dé Cloudflare
var WORKER_URL = loadWorkerUrl();

// Fallback proxies por si el worker no está configurado aún
var FALLBACK_PROXIES = [

var DIAG = [];
function addDiag(msg) {
  var ts = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  DIAG.unshift('['+ts+'] '+msg);
  DIAG = DIAG.slice(0,60);
  var el = document.getElementById('diag-panel');
  if (el) el.innerHTML = DIAG.map(function(d){
    var col = d.includes('✓')?'#00FF87':d.includes('✗')?'#FF3B5C':'#8896AA';
    return '<div style="font-size:10px;color:'+col+';padding:2px 0;border-bottom:1px solid #1A2035">'+d+'</div>';
  }).join('');
}

async function fetchWithTimeout(url, ms) {
  var ctrl = new AbortController();
  var tid = setTimeout(function(){ctrl.abort();}, ms||15000);
  try {
    var r = await fetch(url, {signal: ctrl.signal, mode:'cors'});
    clearTimeout(tid);
    return r;
  } catch(e) { clearTimeout(tid); throw e; }
}

async function proxyFetch(targetUrl, label, apiKeyForHeader) {
  addDiag('→ '+label);

  // Try Cloudflare Workers (principal + backup automático)
  var workersToTry = [];
  if (WORKER_URL && WORKER_URL !== 'YOUR-WORKER-URL') workersToTry.push({url: WORKER_URL, name: 'Worker principal'});
  workersToTry.push({url: WORKER_URL_BACKUP, name: 'Worker backup'});

  for (var wi = 0; wi < workersToTry.length; wi++) {
    var workerEntry = workersToTry[wi];
    try {
      var fullUrl = workerEntry.url+'?url='+encodeURIComponent(targetUrl);
      if (apiKeyForHeader) fullUrl += '&apikeyheader='+encodeURIComponent(apiKeyForHeader);
      var r = await fetchWithTimeout(fullUrl, 15000);
      if (r.ok) {
        var txt = await r.text();
        if (txt && txt.length > 2) {
          try {
            var j=JSON.parse(txt);
            addDiag('✓ '+label+' ('+workerEntry.name+', '+txt.length+'b)');
            return j;
          } catch(e){
            addDiag('  '+workerEntry.name+' texto no-JSON: '+txt.substring(0,60));
          }
        } else {
          addDiag('  '+workerEntry.name+' respuesta vacía');
        }
      } else {
        var errTxt = '';
        try { errTxt = await r.text(); } catch(e){}
        addDiag('  '+workerEntry.name+' HTTP '+r.status+': '+errTxt.substring(0,70));
      }
    } catch(e) { addDiag('  '+workerEntry.name+': '+(e.name==='AbortError'?'timeout':e.message.substring(0,40))); }
  }

  // Fallback to public proxies
  for (var i=0; i<FALLBACK_PROXIES.length; i++) {
    var pName = i===0?'corsproxy.io':'AllOrigins';
    try {
      var proxied = FALLBACK_PROXIES[i](targetUrl);
      addDiag('  via '+pName+'...');
      var r2 = await fetchWithTimeout(proxied, 15000);
      if (!r2.ok) { addDiag('  ✗ '+pName+' HTTP '+r2.status); ERRORS.push({src:label,code:r2.status,msg:pName,t:Date.now()}); continue; }
      var txt2 = await r2.text();
      if (!txt2||txt2.length<3) { addDiag('  ✗ '+pName+' vacío'); continue; }
      try {
        var j2 = JSON.parse(txt2);
        if (j2.contents !== undefined) { try{j2=JSON.parse(j2.contents);}catch(e){j2=j2.contents;} }
        addDiag('✓ '+label+' ('+pName+')');
        return j2;
      } catch(e) { addDiag('  ✗ JSON error: '+e.message.substring(0,30)); ERRORS.push({src:label,msg:'JSON:'+e.message.substring(0,40),t:Date.now()}); }
    } catch(e) {
      var em=e.name==='AbortError'?'timeout 15s':e.message.substring(0,35);
      addDiag('  ✗ '+pName+': '+em);
      ERRORS.push({src:label,msg:pName+': '+em,t:Date.now()});
    }
  }
  addDiag('✗ '+label+' — todos los proxies fallaron');
  return null;
}

// ── DIRECT API CALLS (via CORS proxy) ──────────────────────
async function fetchTheOdds() {
  // Step 1: get active sports (free, no quota cost) - cache it
  if (!window._cachedSports || Date.now() - (window._sportsCacheTime||0) > 86400000) {
    var sportsUrl = 'https://api.the-odds-api.com/v4/sports/?apiKey=' + KEYS.theOdds;
    var sportsData = await proxyFetch(sportsUrl, 'The Odds API (sports list)');
    if (sportsData && Array.isArray(sportsData)) {
      window._cachedSports = sportsData.filter(function(s){return s.active;}).map(function(s){return s.key;});
      window._sportsCacheTime = Date.now();
      addDiag('  Deportes activos detectados: '+window._cachedSports.length);
    }
  }
  var all = window._cachedSports || [];

  // En vez de elegir SOLO 1 liga por categoría, tomamos VARIAS de cada una.
  // Así si la NBA está fuera de temporada, aún consultamos WNBA, EuroLiga, etc.
  // PRESUPUESTO REAL: 500 peticiones/mes ÷ refresco cada 8h (≈90 escaneos/mes)
  // = máximo ~5 ligas por escaneo para no agotar la cuota antes de fin de mes.
  // Antes esto pedía 23 ligas por escaneo, lo que agotaba la cuota mensual
  // en menos de 2 días de uso real. Priorizamos las ligas de mayor volumen.
  //
  // IMPORTANTE: OddsPapi (nuestra única fuente de Pinnacle) SOLO cubre fútbol.
  // Baloncesto, tenis y fútbol americano de The Odds API nunca tendrán EV+
  // porque no hay cuota de Pinnacle con la que compararlos. Priorizamos
  // fútbol (4 ligas) para maximizar el solapamiento real con Pinnacle.
  // Lista amplia de países/competiciones solicitados. Usamos coincidencia de
  // palabra clave sobre la lista REAL de deportes activos ahora mismo
  // (window._cachedSports), no slugs adivinados — así nos adaptamos a lo que
  // The Odds API realmente tenga disponible en cada momento, sin fallar por
  // un nombre de liga mal adivinado.
  var priorityKeywords = [
    'world_cup', 'fifa_world_cup',                                    // Mundial
    'argentina',                                                       // Argentina (todas categorías)
    'australia', 'a_league',                                           // Australia
    'belarus',                                                         // Bielorrusia
    'brazil', 'brasil', 'serie_b', 'serie_c',                          // Brasil (todo lo posible)
    'chile',                                                           // Chile
    'china', 'super_league',                                           // China
    'korea', 'k_league',                                               // Corea del Sur
    'la_liga', 'spain', 'segunda', 'copa_del_rey',                     // España (todas las ligas)
    'usa', 'mls', 'usl',                                               // EEUU
    'estonia',                                                         // Estonia
    'ireland',                                                         // Irlanda
    'iceland',                                                         // Islandia
    'faroe',                                                           // Islas Feroe
    'japan', 'j_league',                                               // Japón
    'latvia',                                                          // Letonia
    'morocco',                                                         // Marruecos
    'club_friendlies', 'friendlies',                                   // Amistosos de clubes
  ];
  var allSoccerAvailable = all.filter(function(k){return k.indexOf('soccer_')===0;});
  // EXCLUIR explícitamente mercados de futuro tipo "_winner" (¿quién gana el
  // torneo?) — The Odds API los rechaza con HTTP 422 cuando pedimos
  // markets=h2h, porque ese mercado no aplica a partidos individuales.
  var validSoccerLeagues = allSoccerAvailable.filter(function(k){ return !k.includes('_winner'); });
  var soccerKeys = validSoccerLeagues.filter(function(k){
    return priorityKeywords.some(function(kw){ return k.includes(kw); });
  });
  // Priorizar el Mundial/Mundial de Clubes (mejor cobertura de Bet365/Winamax
  // al ser un torneo mediático) poniéndolo primero en la lista
  soccerKeys.sort(function(a,b){
    var aIsWC = a.includes('world_cup') ? 0 : 1;
    var bIsWC = b.includes('world_cup') ? 0 : 1;
    return aIsWC - bIsWC;
  });
  soccerKeys = soccerKeys.slice(0,15); // ampliado de 8 a 15 — cubrir más países de los solicitados
  // Fallback: si ninguna liga prioritaria está activa ahora, usar cualquier
  // soccer_ disponible en vez de quedarse sin nada
  if (!soccerKeys.length) {
    soccerKeys = validSoccerLeagues.slice(0,15);
  }
  addDiag('  TODAS las ligas de fútbol activas ahora ('+allSoccerAvailable.length+'): '+allSoccerAvailable.join(', '));
  var basketKeys = [];
  var tennisKeys = [];
  var hockeyKeys = [];
  var baseballKeys = [];
  var amFootballKeys = [];
  var mmaKeys = [];

  var targets = soccerKeys.concat(basketKeys, tennisKeys, hockeyKeys, baseballKeys, amFootballKeys, mmaKeys);
  if (!targets.length) targets = all.filter(function(k){return k.indexOf('soccer_')===0;}).slice(0,5); // fallback: cualquier fútbol activo
  addDiag('  Ligas a consultar: '+targets.length+' ('+targets.join(', ')+')');

  var allResults = [];
  for (var i=0; i<targets.length; i++) {
    var sportKey = targets[i];
    var sportIcon = sportKey.indexOf('soccer')===0?'⚽' : sportKey.indexOf('basketball')===0?'🏀' : sportKey.indexOf('tennis')===0?'🎾' : sportKey.indexOf('icehockey')===0?'🏒' : sportKey.indexOf('baseball')===0?'⚾' : sportKey.indexOf('americanfootball')===0?'🏈' : sportKey.indexOf('mma')===0?'🥊' : '🏆';

    var now = new Date();
    var future = new Date(now.getTime() + 5*24*60*60*1000); // próximos 5 días
    var url = 'https://api.the-odds-api.com/v4/sports/' + sportKey + '/odds/?apiKey='
      + KEYS.theOdds + '&regions=eu,uk,fr&markets=h2h&oddsFormat=decimal'
      + '&commenceTimeTo=' + future.toISOString().split('.')[0] + 'Z';
    var data = await proxyFetch(url, 'The Odds API ('+sportKey+')');
    if (!data || !Array.isArray(data)) continue;
    apiStatus.theOdds = 'ok';
    var noBookCoverage = 0;

    data.forEach(function(ev) {
      var b365={}, winamax={}, pin={}, points={}, witnesses={};
      (ev.bookmakers||[]).forEach(function(bm) {
        var n=(bm.key||'').toLowerCase();
        var tgt = n.includes('pinnacle') ? pin : n.includes('winamax') ? winamax : n.includes('bet365') ? b365 : null;
        // CASAS TESTIGO: no las usamos para apostar (Alvaro solo opera en Bet365/
        // Winamax/Betfair), pero ya vienen incluidas gratis en esta misma llamada.
        // Las guardamos aparte para reforzar el steam move: si Pinnacle+Bet365+
        // Winamax se mueven Y además 2-3 casas testigo más confirman la misma
        // dirección, la señal es mucho más fiable que con solo 3 fuentes.
        // Tope de 5 testigos por partido para no inflar el payload sin necesidad.
        if (!tgt && Object.keys(witnesses).length < 5) {
          witnesses[bm.key] = witnesses[bm.key] || {};
          tgt = witnesses[bm.key];
        }
        if (!tgt) return;
        (bm.markets||[]).forEach(function(mkt) {
          (mkt.outcomes||[]).forEach(function(o) {
            var k = (mkt.key||'h2h')+'_'+(o.name||'');
            if (tgt[k]===undefined) tgt[k] = parseFloat(o.price||0);
            // Guardar el punto/línea (ej: 2.5 en "Over 2.5") para detectar middles después
            if (o.point!==undefined && !points[k]) points[k] = {point:o.point, book: n.includes('winamax')?'Winamax':n.includes('bet365')?'Bet365':n.includes('pinnacle')?'Pinnacle':n};
          });
        });
      });
      if (Object.keys(b365).length===0 && Object.keys(winamax).length===0) noBookCoverage++;
      if (Object.keys(b365).length>0 || Object.keys(winamax).length>0 || Object.keys(pin).length>0) {
        allResults.push({id:ev.id, sport:sportIcon, match:(ev.home_team||'')+' vs '+(ev.away_team||''), comp:ev.sport_title||sportKey, ko:ev.commence_time, b365:b365, winamax:winamax, pin:pin, points:points, witnesses:witnesses, src:'TheOddsAPI'});
      }
    });
    if (noBookCoverage>0) addDiag('  '+sportKey+': '+noBookCoverage+'/'+data.length+' partidos SIN Bet365/Winamax (otras casas no nos sirven)');
  }
  return allResults;
}

async function fetchOddsApiIo() {
  // Plan gratis real: 5.000 peticiones/HORA (no por mes) — mucho margen para
  // cubrir varios deportes, no solo fútbol como antes. Ampliamos a los
  // deportes de mayor volumen + un hueco para los que pidió el usuario
  // (hockey, esports). Tenis de mesa/vóley no están confirmados en su
  // catálogo público, así que no los forzamos para evitar peticiones vacías.
  // CORREGIDO: el plan gratis real es 100 peticiones/HORA (no 5000 — eso es
  // solo para planes de pago, confirmado tras el error 429 real del usuario).
  // Con ese límite real, cubrir 6 deportes obligaría a un intervalo de ~21min,
  // demasiado lento. Reducimos a los 3 deportes de mayor volumen/liquidez.
  var SPORTS_TARGET = ['football', 'tennis'];
  var allResults = [];

  for (var s = 0; s < SPORTS_TARGET.length; s++) {
    var sport = SPORTS_TARGET[s];
    var sportIcon = sport==='football'?'⚽' : sport==='basketball'?'🏀' : sport==='tennis'?'🎾' : '🏆';

    var leaguesUrl = 'https://api.odds-api.io/v3/leagues?apiKey=' + KEYS.oddsApi + '&sport=' + sport + '&all=true';
    var leagues = await proxyFetch(leaguesUrl, 'Odds-API.io (leagues '+sport+')');
    if (!leagues || !Array.isArray(leagues) || !leagues.length) continue;

    var preferred = ['england-premier-league','spain-la-liga','world-cup','uefa-champions-league','italy-serie-a','nba','atp','wta'];
    var league = leagues.find(function(l){ return preferred.includes(l.slug) && (l.eventsCount===undefined || l.eventsCount>0); });
    if (!league) {
      // En vez de coger la primera liga con algún evento (a menudo una con
      // 1-2 partidos sueltos), ordenamos por número de eventos y cogemos la
      // que tiene más — mucha más probabilidad real de tener cobertura de
      // Bet365 y partidos pendientes de verdad.
      var withEvents = leagues.filter(function(l){ return (l.eventsCount||0) > 0; });
      withEvents.sort(function(a,b){ return (b.eventsCount||0) - (a.eventsCount||0); });
      league = withEvents[0] || leagues[0];
    }
    if (!league || !league.slug) continue;

    var eventsUrl = 'https://api.odds-api.io/v3/events?apiKey=' + KEYS.oddsApi
      + '&sport=' + sport + '&league=' + league.slug + '&status=pending&bookmaker=Bet365';
    var events = await proxyFetch(eventsUrl, 'Odds-API.io (events '+sport+')');
    if (!events || !Array.isArray(events) || !events.length) continue;
    apiStatus.oddsApi = 'ok';

    var toFetch = events.slice(0, 2); // 2 eventos por deporte — ajustado al límite real de 100 req/hora
    for (var i = 0; i < toFetch.length; i++) {
      var ev = toFetch[i];
      var oddsUrl = 'https://api.odds-api.io/v3/odds?apiKey=' + KEYS.oddsApi
        + '&eventId=' + ev.id + '&bookmakers=Bet365,Winamax FR';
      var oddsData = await proxyFetch(oddsUrl, 'Odds-API.io (odds '+sport+')');
      if (!oddsData) continue;

      var b365={}, winamax={};
      var bms = oddsData.bookmakers || oddsData;
      if (Array.isArray(bms)) {
        bms.forEach(function(bm) {
          var n=(bm.name||bm.bookmaker||'').toLowerCase();
          var tgt = n.includes('bet365')?b365 : n.includes('winamax')?winamax : null;
          if (!tgt) return;
          (bm.markets||bm.odds||[]).forEach(function(mkt) {
            if (mkt.outcomes) {
              mkt.outcomes.forEach(function(o){ tgt['h2h_'+(o.name||'')] = parseFloat(o.price||o.odds||0); });
            } else if (mkt.home !== undefined) {
              tgt['h2h_home']=parseFloat(mkt.home||0); tgt['h2h_away']=parseFloat(mkt.away||0);
              if (mkt.draw) tgt['h2h_draw']=parseFloat(mkt.draw);
            }
          });
        });
      }
      if (Object.keys(b365).length || Object.keys(winamax).length) {
        // Nota: esta fuente no tiene Pinnacle (confirmado vía /v3/bookmakers),
        // así que no aporta referencia sharp para EV+. Se usa para comparación
        // directa Bet365 vs Winamax (arbitraje/middles), no para detectEV.
        allResults.push({id:ev.id, sport:sportIcon, match:(ev.home||'')+' vs '+(ev.away||''), comp:league.name||'', ko:ev.starts||ev.startTime, b365:b365, winamax:winamax, pin:null, src:'OddsAPI.io'});
      }
    }
  }
  return allResults;
}

// Convierte cuota americana (+108, -102) a decimal, formato que usa el resto de la app
function americanToDecimal(american) {
  var n = parseFloat(american);
  if (!n) return null;
  if (n > 0) return (n/100) + 1;
  return (100/Math.abs(n)) + 1;
}

async function fetchSGO() {
  // IMPORTANTE: el plan gratuito de SGO NO incluye desglose por casa
  // (byBookmaker sale vacío — confirmado en respuesta real: "Response is
  // missing 2 bookmaker odds. Upgrade your API key..."). Solo el plan de
  // pago ($149+/mes) da Pinnacle real. En el plan gratis SÍ vienen gratis
  // "fairOdds" (precio de mercado sin vig, vía regresión) y "bookOdds"
  // (consenso del mercado con vig). Usamos fairOdds como referencia de
  // "precio justo" — conceptualmente similar a lo que aporta Pinnacle,
  // aunque no es Pinnacle real. Lo etiquetamos honestamente como tal.
  // Solo NBA confirmada en plan gratis (probado directamente: success:true).
  // Otras ligas (WNBA confirmada NO disponible) pueden no estar incluidas
  // en el plan gratuito y tirar toda la petición abajo si se piden juntas.
  // Ligas CONFIRMADAS en el plan gratuito real (verificado vía /v2/leagues):
  // NBA, MLB, NFL, NHL, NCAAB, NCAAF, MLS, UEFA_CHAMPIONS_LEAGUE.
  // EPL/LA_LIGA/SERIE_A/BUNDESLIGA NO están disponibles en este plan — antes
  // fallaba toda la petición por pedir ligas no permitidas.
  var url = 'https://api.sportsgameodds.com/v2/events?leagueID=NBA,NFL,MLB,NHL,MLS,UEFA_CHAMPIONS_LEAGUE&oddsAvailable=true&limit=25&apiKey=' + KEYS.sgo;
  var data = await proxyFetch(url, 'SportsGameOdds');
  // Si alguna liga no está en el plan gratis, la API devuelve success:false
  // para TODA la petición. Reintentamos con solo NBA (confirmada disponible)
  // en vez de perder todo el escaneo.
  if (!data || data.success===false) {
    addDiag('  SGO: fallback a NBA-only (alguna liga no disponible en el plan)');
    var fallbackUrl = 'https://api.sportsgameodds.com/v2/events?leagueID=NBA,MLB&oddsAvailable=true&limit=25&apiKey=' + KEYS.sgo;
    data = await proxyFetch(fallbackUrl, 'SportsGameOdds (NBA/MLB fallback)');
  }
  if (!data || data.success===false) return [];
  apiStatus.sgo = 'ok';
  var events = data.data || data.events || (Array.isArray(data)?data:[]);
  if (!Array.isArray(events)) { addDiag('  SGO: estructura inesperada, keys: '+Object.keys(data||{}).join(',')); return []; }
  addDiag('  SGO: '+events.length+' eventos crudos recibidos'+(data.notice?' (plan gratis: '+data.notice.substring(0,50)+')':''));

  var nowTs = Date.now();
  var beforeFilterCount = events.length;
  events = events.filter(function(ev) {
    var st = ev.status || {};
    // CRÍTICO: descartar partidos ya terminados, cancelados o cuya hora de
    // inicio ya pasó. Sin este filtro, un partido jugado hace días puede
    // seguir apareciendo como "oportunidad activa de apostar" — bug grave
    // detectado el 20/06/2026: Spurs vs Knicks del 14/06 seguía mostrándose
    // como pick válido "de hoy" varios días después de jugado.
    if (st.completed === true || st.ended === true || st.cancelled === true) return false;
    var startsAt = st.startsAt;
    var startTs = startsAt ? new Date(startsAt).getTime() : NaN;
    // FAIL-SAFE: si no hay fecha de inicio fiable, descartar el evento por
    // seguridad en vez de asumir que es válido.
    if (isNaN(startTs)) return false;
    var hoursDiff = (nowTs - startTs) / 3600000; // positivo = ya empezó, negativo = aún no
    // NUNCA confiar solo en el flag "started:false" de la API — ese fue
    // exactamente el bug de Spurs vs Knicks (un partido del 14/06 seguía
    // marcado como "Upcoming" días después). La fecha real manda siempre.
    if (hoursDiff < 0) return hoursDiff > -120; // futuro, máximo 5 días vista
    return hoursDiff <= 6; // ya empezado, máximo 6h de margen
  });
  if (events.length !== beforeFilterCount) {
    addDiag('  SGO: '+(beforeFilterCount-events.length)+' eventos finalizados/pasados/sin fecha descartados');
  }
  addDiag('  SGO supervivientes: '+events.map(function(e){
    var h = (e.teams&&e.teams.home&&e.teams.home.names&&e.teams.home.names.medium)||'?';
    var a = (e.teams&&e.teams.away&&e.teams.away.names&&e.teams.away.names.medium)||'?';
    return h+'/'+a+'@'+((e.status&&e.status.startsAt)||'sin-fecha');
  }).join(', '));

  return events.slice(0,15).map(function(ev) {
    var b365={}, pin={};
    var homeT = (ev.teams && ev.teams.home && ev.teams.home.names) ? ev.teams.home.names.medium : (ev.homeTeam||'Home');
    var awayT = (ev.teams && ev.teams.away && ev.teams.away.names) ? ev.teams.away.names.medium : (ev.awayTeam||'Away');

    if (ev.odds) {
      Object.keys(ev.odds).forEach(function(oddID) {
        // CRÍTICO: solo el mercado "points-...-game-ml-home/away" es el
        // resultado real del partido (Moneyline). Otros mercados como
        // "firstToScore-...-ml-home" o "lastToScore-...-ml-away" también
        // contienen "ml-home"/"ml-away" en su oddID pero son apuestas de
        // prop totalmente distintas, con cuotas extremas (+5000, +11300)
        // que NO representan la victoria del equipo. Por eso aparecían
        // cuotas absurdas antes — eran props, no el resultado del partido.
        var oddIdLower = oddID.toLowerCase();
        var isML = oddIdLower.indexOf('points-home-game-ml-home')===0 || oddIdLower.indexOf('points-away-game-ml-away')===0;
        if (!isML) return;
        var oddData = ev.odds[oddID];
        var sideRaw = oddID.toLowerCase().indexOf('home')>-1 ? 'home' : 'away';
        // Usar el nombre REAL del equipo, no la palabra "home"/"away" literal —
        // eso es lo que causaba "Victoria de home" en vez de "Victoria de Braves".
        var sideName = sideRaw === 'home' ? homeT : awayT;

        // Primero intentamos byBookmaker (solo funciona en plan de pago)
        var byBk = oddData.byBookmaker || {};
        Object.keys(byBk).forEach(function(bkName) {
          var bk = byBk[bkName];
          if (!bk || bk.odds===undefined) return;
          var bkLower = bkName.toLowerCase();
          var tgt = bkLower.includes('pinnacle') ? pin : b365;
          // CRÍTICO: bk.odds viene en formato americano (igual que fairOdds/bookOdds),
          // NO en decimal. Sin esta conversión, cuotas como +1500/+1700 se mostraban
          // tal cual como si fueran decimales — de ahí las cuotas absurdas vistas en producción.
          var bkDec = americanToDecimal(bk.odds);
          if (tgt['h2h_'+sideName]===undefined && bkDec && bkDec>1.01 && bkDec<50) tgt['h2h_'+sideName] = bkDec;
        });

        // Fallback gratuito: fairOdds (precio justo de mercado) como referencia,
        // y bookOdds (consenso con vig) como "casa genérica" si no hay byBookmaker real.
        // Validamos rango realista (cuota decimal entre 1.01 y 50) para evitar
        // valores absurdos si la API devuelve un campo en formato inesperado.
        if (pin['h2h_'+sideName]===undefined && oddData.fairOdds) {
          var fairDec = americanToDecimal(oddData.fairOdds);
          if (fairDec && fairDec>1.01 && fairDec<50) pin['h2h_'+sideName] = fairDec;
        }
        if (b365['h2h_'+sideName]===undefined && oddData.bookOdds) {
          var bookDec = americanToDecimal(oddData.bookOdds);
          if (bookDec && bookDec>1.01 && bookDec<50) b365['h2h_'+sideName] = bookDec;
        }
      });
    }

    var lg = ev.leagueID || '';
    var sp = ['NBA','WNBA'].includes(lg)?'🏀' : ['NFL'].includes(lg)?'🏈' : ['MLB'].includes(lg)?'⚾' : ['NHL'].includes(lg)?'🏒' : ['ATP','WTA'].includes(lg)?'🎾' : ['UFC'].includes(lg)?'🥊' : '⚽';
    // Campo real confirmado en respuesta de la API: ev.status.startsAt (no startsTime)
    var koTime = (ev.status && ev.status.startsAt) || ev.startsAt || ev.startTime || '';
    return {id:ev.eventID||ev.id, sport:sp, match:homeT+' vs '+awayT, comp:lg, ko:koTime, b365:b365, pin:pin, src:'SGO'};
  }).filter(function(e){return Object.keys(e.b365).length>0 || Object.keys(e.pin).length>0;});
}

}

// ── ESPORTS via OddsPapi (CS2, LoL, Dota 2, Valorant) ──────
// Misma API que ya usamos para Pinnacle fútbol, mismo plan gratis (250/mes),
// sin coste adicional. Verificado: sportId 17=CS2, 18=LoL, 16=Dota2, 61=Valorant.
// Market 171 = Match Winner. Pinnacle Y Bet365 vienen en la misma respuesta,
// lo que permite calcular EV+ real para esports, no solo mostrar datos sueltos.
async function fetchOddsPapiEsports() {
  // CS2 (mayor volumen, 2 partidos/escaneo) + LoL (segundo título, 1 partido/escaneo)
  // Presupuesto recalculado: fútbol 50%, CS2 30%, LoL 20% de la cuota compartida.
  var ESPORT_CONFIG = [
    {id:17, icon:'🎯 CS2', maxFixtures:2},
    {id:18, icon:'🎮 LoL', maxFixtures:1}
  ];
  var allResults = [];

  for (var c=0; c<ESPORT_CONFIG.length; c++) {
    var cfg = ESPORT_CONFIG[c];
    var today = new Date().toISOString().split('T')[0];
    var weekOut = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
    var fixturesUrl = 'https://api.oddspapi.io/v4/fixtures?sportId='+cfg.id+'&from='+today+'&to='+weekOut+'&hasOdds=true&apiKey=' + KEYS.oddsPapi;
    var fixtures = await proxyFetch(fixturesUrl, 'OddsPapi Esports ('+cfg.icon+')');
    if (!fixtures || !Array.isArray(fixtures) || !fixtures.length) continue;

    fixtures.slice(0,cfg.maxFixtures).forEach(function(fx) { fx._sportIcon = cfg.icon; });
    allResults = allResults.concat(fixtures.slice(0,cfg.maxFixtures));
  }
  if (!allResults.length) return [];
  apiStatus.oddsPapiEsports = 'ok';

  var out = [];
  for (var i=0; i<allResults.length; i++) {
    var fx = allResults[i];
    var oddsUrl = 'https://api.oddspapi.io/v4/odds?fixtureId='+fx.fixtureId+'&bookmakers=pinnacle,bet365&apiKey=' + KEYS.oddsPapi;
    var data = await proxyFetch(oddsUrl, 'OddsPapi Esports odds');
    if (!data || !data.bookmakerOdds) continue;

    var b365 = {}, pin = {};
    Object.keys(data.bookmakerOdds).forEach(function(slug) {
      var bk = data.bookmakerOdds[slug];
      var markets = bk.markets || {};
      var mw = markets['171']; // Match Winner
      if (!mw || !mw.outcomes) return;
      var p1 = mw.outcomes['171'] && mw.outcomes['171'].players && mw.outcomes['171'].players['0'];
      var p2 = mw.outcomes['172'] && mw.outcomes['172'].players && mw.outcomes['172'].players['0'];
      if (!p1 || !p2) return;
      var tgt = slug==='pinnacle' ? pin : slug==='bet365' ? b365 : null;
      if (!tgt) return; // solo nos interesan Pinnacle (referencia) y Bet365 (tu casa real)
      tgt['h2h_'+(fx.participant1Name||'Team1')] = parseFloat(p1.price||0);
      tgt['h2h_'+(fx.participant2Name||'Team2')] = parseFloat(p2.price||0);
    });

    if (Object.keys(b365).length || Object.keys(pin).length) {
      out.push({id:'esport_'+fx.fixtureId, sport:fx._sportIcon, match:(fx.participant1Name||'')+' vs '+(fx.participant2Name||''), comp:fx.tournamentName||'', ko:fx.startTime, b365:b365, winamax:{}, pin:pin, src:'OddsPapiEsports'});
    }
  }
  return out;
}

async function fetchOddsPapi() {
  // sportId=10 es fútbol (confirmado por la documentación oficial). OddsPapi
  // cubre 1.372 torneos de fútbol incluyendo ligas menores/juveniles/femeninas
  // con Bet365 incluido en el mismo feed — confirmado en su documentación
  // oficial. El bug anterior: pedíamos "bookmaker=pinnacle" que descarta
  // Bet365/Winamax de la respuesta, aunque vengan en el mismo JSON bajo
  // bookmakerOdds.bet365 / bookmakerOdds.winamax. Ahora pedimos sin filtro
  // de bookmaker y extraemos los tres de la misma llamada.
  var SPORT_CONFIG = [
    {key:'soccer', id: 10, icon:'⚽'},
  ];

  var allOut = [];
  var todayPapi = new Date().toISOString().split('.')[0]+'Z';
  var hoursOutPapi = new Date(Date.now() + 40*60*60*1000).toISOString().split('.')[0]+'Z'; // 40h, bajo el límite de 48h sin tournamentId
  for (var si=0; si<SPORT_CONFIG.length; si++) {
    var sc = SPORT_CONFIG[si];
    var fixturesUrl = 'https://api.oddspapi.io/v4/fixtures?sportId='+sc.id+'&from='+todayPapi+'&to='+hoursOutPapi+'&hasOdds=true&apiKey=' + KEYS.oddsPapi;
    var fixtures = await proxyFetch(fixturesUrl, 'OddsPapi (fixtures '+sc.icon+')');
    if (!fixtures || !Array.isArray(fixtures) || !fixtures.length) continue;
    apiStatus.oddsPapi = 'ok';

    // Ampliado de 10/3 a 20/8 fixtures/torneos para cubrir más ligas menores
    var tournamentIds = [...new Set(fixtures.slice(0,20).map(function(f){return f.tournamentId;}).filter(Boolean))].slice(0,8);
    if (!tournamentIds.length) continue;

    // SIN filtro de bookmaker: pedimos todos para poder extraer Pinnacle,
    // Bet365 y Winamax de la misma respuesta, no solo uno
    var oddsUrl = 'https://api.oddspapi.io/v4/odds-by-tournaments?tournamentIds='
      + tournamentIds.join(',') + '&bookmakers=pinnacle,bet365,winamax&apiKey=' + KEYS.oddsPapi;
    var oddsData = await proxyFetch(oddsUrl, 'OddsPapi (odds '+sc.icon+')');
    if (!oddsData || !Array.isArray(oddsData)) continue;

    function extractMoneyline(bkData) {
      var out = {};
      if (!bkData || !bkData.markets) return out;
      var mkt1x2 = bkData.markets['101'];
      if (mkt1x2 && mkt1x2.outcomes) {
        var o = mkt1x2.outcomes;
        if (o['101'] && o['101'].players && o['101'].players['0']) out['h2h_home'] = parseFloat(o['101'].players['0'].price||0);
        if (o['102'] && o['102'].players && o['102'].players['0']) out['h2h_draw'] = parseFloat(o['102'].players['0'].price||0);
        if (o['103'] && o['103'].players && o['103'].players['0']) out['h2h_away'] = parseFloat(o['103'].players['0'].price||0);
      }
      return out;
    }

    var mapped = oddsData.slice(0,30).map(function(fx) {
      var bk = fx.bookmakerOdds || {};
      var pin = extractMoneyline(bk.pinnacle);
      var b365 = extractMoneyline(bk.bet365);
      var winamax = extractMoneyline(bk.winamax);
      return {id:fx.fixtureId, match:(fx.participant1Name||'')+' vs '+(fx.participant2Name||''), ko:fx.startTime, pin:pin, b365:b365, winamax:winamax, sport:sc.icon, src:'OddsPapi'};
    }).filter(function(e){return Object.keys(e.pin).length>0 || Object.keys(e.b365).length>0 || Object.keys(e.winamax).length>0;});

    addDiag('  OddsPapi: '+mapped.length+' partidos con datos de Pinnacle/Bet365/Winamax (de '+tournamentIds.length+' torneos)');
    allOut = allOut.concat(mapped);
  }
  return allOut;
}

function shouldFetch(api) { return Date.now()-lastFetch[api] >= INTERVALS[api]; }

async function runFetch() {
  if (FETCH_RUNNING) { addDiag('Ya hay un escaneo en curso...'); return; }
  FETCH_RUNNING = true;
  LOADING = true;
  setPulse('loading');
  renderPage();

  try {
    var apis = ['theOdds','oddsApi','sgo','sharpApi','oddsPapi','oddsPapiEsports'].filter(shouldFetch);
    if (!apis.length) {
      addDiag('Nada que actualizar todavía (esperando intervalos)');
      LOADING=false; FETCH_RUNNING=false; setPulse('live'); renderPage(); return;
    }
    addDiag('Escaneando: '+apis.join(', '));

    var results = {};
    var jobs = [];
    if (apis.includes('theOdds'))  jobs.push(fetchTheOdds().then(function(r){results.theOdds=r||[]; lastFetch.theOdds=Date.now(); REQ.theOdds=(REQ.theOdds||0)+1;}).catch(function(e){addDiag('✗ theOdds: '+e.message.substring(0,40)); apiStatus.theOdds='error';}));
    if (apis.includes('oddsApi'))  jobs.push(fetchOddsApiIo().then(function(r){results.oddsApi=r||[]; lastFetch.oddsApi=Date.now(); REQ.oddsApi=(REQ.oddsApi||0)+1;}).catch(function(e){addDiag('✗ oddsApi: '+e.message.substring(0,40)); apiStatus.oddsApi='error';}));
    if (apis.includes('sgo'))      jobs.push(fetchSGO().then(function(r){results.sgo=r||[]; lastFetch.sgo=Date.now(); REQ.sgo=(REQ.sgo||0)+1;}).catch(function(e){addDiag('✗ sgo: '+e.message.substring(0,40)); apiStatus.sgo='error';}));
    if (apis.includes('sharpApi'))  jobs.push(fetchSharpApi().then(function(r){results.sharpApi=r||[]; lastFetch.sharpApi=Date.now(); REQ.sharpApi=(REQ.sharpApi||0)+1;}).catch(function(e){addDiag('✗ sharpApi: '+e.message.substring(0,40)); apiStatus.sharpApi='error';}));
    if (apis.includes('oddsPapi')) jobs.push(fetchOddsPapi().then(function(r){results.oddsPapi=r||[]; lastFetch.oddsPapi=Date.now(); REQ.oddsPapi=(REQ.oddsPapi||0)+1;}).catch(function(e){addDiag('✗ oddsPapi: '+e.message.substring(0,40)); apiStatus.oddsPapi='error';}));
    if (apis.includes('oddsPapiEsports')) jobs.push(fetchOddsPapiEsports().then(function(r){results.oddsPapiEsports=r||[]; lastFetch.oddsPapiEsports=Date.now(); REQ.oddsPapiEsports=(REQ.oddsPapiEsports||0)+1;}).catch(function(e){addDiag('✗ esports: '+e.message.substring(0,40)); apiStatus.oddsPapiEsports='error';}));

    await Promise.allSettled(jobs);
    saveReq();

    processDirectResults(results);
    LAST_UP = Date.now();
    REQ.lastScan = LAST_UP;
    REQ.scanCount = (REQ.scanCount||0)+1;
    saveReq();
    addDiag('✓ Escaneo completo · '+MONITOR.length+' eventos · '+ALERTS.length+' alertas');
    setPulse('live');

  } catch(e) {
    addDiag('✗ Error general: '+e.message.substring(0,60));
    ERRORS.push({src:'runFetch', msg:e.message, t:Date.now()});
    setPulse('error');
  }

  LOADING = false;
  FETCH_RUNNING = false;
  renderPage();
  updateBadge();
}

function translateTeamName(name) {
  if (!name) return name;
  var key = name.toLowerCase().trim();
  return COUNTRY_TRANSLATIONS[key] || name;
}
function translateMatchName(matchStr) {
  if (!matchStr || matchStr.indexOf(' vs ')===-1) return matchStr;
  var parts = matchStr.split(' vs ');
  if (parts.length !== 2) return matchStr;
  return translateTeamName(parts[0].trim()) + ' vs ' + translateTeamName(parts[1].trim());
}

function normalizeTeamName(name) {
  if (!name) return '';
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // quitar acentos
    .replace(/\b(fc|cf|sc|afc|cd|ud|rcd|real|atletico|athletic|club|deportivo)\b/g, '')
    .replace(/[^a-z0-9]/g, '')
    .trim();
}
function matchPinnacleEvent(ev, pinnacleList) {
  if (!ev.match || !pinnacleList || !pinnacleList.length) return null;
  var parts = ev.match.split(' vs ');
  if (parts.length !== 2) return null;
  var evA = normalizeTeamName(parts[0]), evB = normalizeTeamName(parts[1]);
  if (!evA || !evB) return null;
  var evTime = ev.ko ? new Date(ev.ko).getTime() : null;

  var best = null, bestScore = 0;
  pinnacleList.forEach(function(p) {
    if (!p.match) return;
    var pParts = p.match.split(' vs ');
    if (pParts.length !== 2) return;
    var pA = normalizeTeamName(pParts[0]), pB = normalizeTeamName(pParts[1]);
    if (!pA || !pB) return;

    // Coincidencia de nombres en cualquier orden (home/away puede variar entre fuentes)
    var namesMatch = (evA===pA && evB===pB) || (evA===pB && evB===pA) ||
      (pA.indexOf(evA)>-1 && pB.indexOf(evB)>-1) || (pA.indexOf(evB)>-1 && pB.indexOf(evA)>-1);
    if (!namesMatch) return;

    // Si tenemos hora de inicio en ambas fuentes, exigir que estén dentro de 1h
    // (reducido de 3h: una ventana más amplia aumenta el riesgo de emparejar
    // por error dos partidos distintos de la misma liga el mismo día)
    if (evTime && p.ko) {
      var pTime = new Date(p.ko).getTime();
      var diffH = Math.abs(evTime - pTime) / 3600000;
      if (diffH > 1) return;
    }
    var score = 2; // coincidencia de nombre válida
    if (score > bestScore) { bestScore = score; best = p; }
  });
  return best;
}

function processDirectResults(results) {
  var newAlerts=[], newSharp=[], newValue=[], newMon=[], newArb=[];
  var totalRaw = 0;
  var pinnacleList = (results.oddsPapi || []).concat(
    (results.sgo || []).filter(function(s){ return s.pin && Object.keys(s.pin).length>0; })
  );

  ['theOdds','oddsApi','sgo','sharpApi','oddsPapiEsports','oddsPapi'].forEach(function(src) {
    totalRaw += (results[src]||[]).length;
    (results[src]||[]).forEach(function(ev) {
      if (!ev || !ev.id) return;
      var pinMatch = (ev.pin && Object.keys(ev.pin).length) ? null : matchPinnacleEvent(ev, pinnacleList);
      var pin = (ev.pin && Object.keys(ev.pin).length) ? ev.pin : (pinMatch ? pinMatch.pin : {});
      ev.match = translateMatchName(ev.match); // traducir SOLO para mostrar, después del cruce con Pinnacle
      var b365 = ev.b365 || {};
      var winamax = ev.winamax || {};
      var points = ev.points || {};
      var hasAny = Object.keys(b365).length>0 || Object.keys(winamax).length>0 || Object.keys(pin).length>0;

      if (hasAny) {
        newMon.push({sport:ev.sport||'⚽', match:ev.match, comp:ev.comp||'', ko:ev.ko||'', b365:b365, winamax:winamax, pin:pin, src:ev.src});
        if (Object.keys(b365).length>0 || Object.keys(winamax).length>0) {
          // Ligas de alta liquidez confirmadas (gran volumen profesional) vs
          // todo lo demás, que tratamos como "menor" por seguridad — mejor
          // pedir más confirmación de menos ligas conocidas que arriesgarnos
          // a etiquetar ruido de mercados pequeños como sharp money real.
          var compLower = (ev.comp||'').toLowerCase();
          var majorLeagueKeywords = ['nba','nfl','mlb','nhl','premier league','la liga','serie a','bundesliga','champions league','epl'];
          var isMinorLeague = !majorLeagueKeywords.some(function(kw){ return compLower.includes(kw); });

          var witnesses = ev.witnesses || {};
          detectEV(ev.id, ev.sport||'⚽', ev.match, ev.ko||'', b365, winamax, pin, newValue, newAlerts, ev.src);
          detectSharp(ev.id, ev.sport||'⚽', ev.match, ev.ko||'', b365, winamax, pin, witnesses, newSharp, newAlerts, isMinorLeague);
          detectDivergence(ev.id, ev.sport||'⚽', ev.match, ev.ko||'', b365, winamax, pin, newAlerts);
          detectSuspension(ev.id, ev.sport||'⚽', ev.match, ev.ko||'', b365, winamax, newAlerts);
          detectArbitrage(ev.id, ev.sport||'⚽', ev.match, ev.ko||'', b365, winamax, newArb, newAlerts);
          detectMiddles(ev.id, ev.sport||'⚽', ev.match, ev.ko||'', b365, winamax, points, newArb, newAlerts);
          HISTORY[ev.id] = {b365: Object.assign({}, b365), winamax: Object.assign({}, winamax), pin: Object.assign({}, pin), witnesses: JSON.parse(JSON.stringify(witnesses)), t: Date.now()};
        }
      }
    });
  });

  addDiag('Procesado: '+totalRaw+' eventos crudos → '+newMon.length+' con cuotas'+(newArb.length?' · '+newArb.length+' arbitrajes':''));
  // Desglose por deporte: confirma si el fútbol SÍ se está procesando (solo
  // que sin EV+/Sharp suficiente para generar alerta) o si de verdad no llega
  var sportBreakdown = {};
  newMon.forEach(function(m){ sportBreakdown[m.sport||'?'] = (sportBreakdown[m.sport||'?']||0)+1; });
  addDiag('  Desglose por deporte: '+Object.keys(sportBreakdown).map(function(s){return s+':'+sportBreakdown[s];}).join(' '));
  if (pinnacleList.length === 0) {
    addDiag('  Pinnacle: 0 eventos en este escaneo (OddsPapi no respondió o sin partidos) — sin cruces nuevos posibles');
  } else {
    var withPinCount = newMon.filter(function(m){return m.pin && Object.keys(m.pin).length>0;}).length;
    addDiag('  Pinnacle: '+pinnacleList.length+' eventos disponibles, '+withPinCount+' cruzados con éxito');
  }

  newAlerts.forEach(function(a) { if(!ALERTS.find(function(x){return x.key===a.key;})) ALERTS.unshift(a); });
  // Limpiar alertas viejas (>6h): sin esto, una alerta de un partido ya
  // jugado puede quedarse mostrándose como "oportunidad activa" indefinidamente.
  // Bug detectado el 20/06/2026: pick de Spurs vs Knicks del 14/06 seguía
  // apareciendo días después como si fuera de "hoy".
  var sixHoursAgo = Date.now() - 6*60*60*1000;
  ALERTS = ALERTS.filter(function(a){ return (a.t||0) >= sixHoursAgo; });
  var priorityRank = {highvolume:-1, extreme:0, high:1, normal:2, undefined:2};
  ALERTS.sort(function(a,b){
    var pa = priorityRank[a.priority]!==undefined ? priorityRank[a.priority] : 2;
    var pb = priorityRank[b.priority]!==undefined ? priorityRank[b.priority] : 2;
    if (pa !== pb) return pa - pb;
    return (b.t||0) - (a.t||0);
  });
  ALERTS=ALERTS.slice(0,50);
  newSharp.forEach(function(s) { if(!SHARP.find(function(x){return x.key===s.key;})) SHARP.unshift(s); });
  SHARP=SHARP.slice(0,30);
  VALUEB=newValue.sort(function(a,b){return b.evNum-a.evNum;}).slice(0,20);
  ARB=newArb.sort(function(a,b){return b.profitPct-a.profitPct;}).slice(0,15);
  MONITOR=newMon.slice(0,30);
}

// ── DETECTORS ─────────────────────────────────────────────
// Compara TUS dos casas (Bet365 y Winamax) contra Pinnacle (referencia sharp).
// Para cada mercado, usa la MEJOR cuota entre tus dos casas.
function buildMarketLabel(mktKey, sport) {
  // mktKey examples: "h2h_Taylor Fritz", "totals_Over", "totals_Under", "h2h_Draw"
  var parts = mktKey.split('_');
  var marketType = parts[0]; // h2h | totals | spreads
  var outcome = parts.slice(1).join('_').trim();

  if (marketType === 'h2h') {
    if (outcome.toLowerCase() === 'draw' || outcome.toLowerCase() === 'empate') return 'Empate';
    return 'Victoria de ' + outcome;
  }
  if (marketType === 'totals') {
    if (outcome.toLowerCase().includes('over')) return 'Más de goles/puntos (Over)';
    if (outcome.toLowerCase().includes('under')) return 'Menos de goles/puntos (Under)';
    return 'Total: ' + outcome;
  }
  if (marketType === 'spreads') return 'Hándicap: ' + outcome;
  return outcome || mktKey;
}

// ── ARBITRAJE: beneficio garantizado entre Bet365 y Winamax ──
// A diferencia del EV+, esto NO depende de estimar la probabilidad real con
// Pinnacle. Si la suma de probabilidades implícitas de dos resultados
// excluyentes en TUS dos casas es <100%, puedes apostar a ambos lados y
// ganar dinero seguro sin importar el resultado. Es la categoría que toda
// herramienta profesional (OddsJam, RebelBetting) ofrece y que nos faltaba.
function detectArbitrage(id,sport,match,ko,b365,winamax,outArb,outA) {
  if (!b365 || !winamax) return;
  // Agrupar por tipo de mercado (h2h, totals, spreads) para comparar resultados opuestos
  var groups = {};
  Object.keys(b365).concat(Object.keys(winamax)).forEach(function(mkt) {
    var marketType = mkt.split('_')[0];
    if (!groups[marketType]) groups[marketType] = new Set();
    groups[marketType].add(mkt);
  });

  Object.keys(groups).forEach(function(marketType) {
    var outcomes = Array.from(groups[marketType]);
    if (outcomes.length < 2) return; // necesita al menos 2 resultados excluyentes

    // Para cada resultado, usar la MEJOR cuota disponible entre tus 2 casas
    var bestPerOutcome = outcomes.map(function(mkt) {
      var bVal = parseFloat((b365||{})[mkt]) || 0;
      var wVal = parseFloat((winamax||{})[mkt]) || 0;
      if (wVal > bVal) return {mkt:mkt, odds:wVal, book:'Winamax'};
      return {mkt:mkt, odds:bVal, book:'Bet365'};
    }).filter(function(o){ return o.odds > 1.01; });

    if (bestPerOutcome.length < 2) return;

    // Solo evaluar combinaciones de exactamente 2 resultados opuestos (h2h: ganador A vs B; totals: over vs under)
    // Para h2h con 3 resultados (incluye empate) evaluamos pares, no la tripleta completa (más simple y más fiable con datos limitados)
    for (var i=0; i<bestPerOutcome.length; i++) {
      for (var j=i+1; j<bestPerOutcome.length; j++) {
        var a = bestPerOutcome[i], b = bestPerOutcome[j];
        if (a.book===b.book) continue; // arbitraje real requiere usar TUS DOS casas, no la misma
        var impliedSum = (1/a.odds) + (1/b.odds);
        if (impliedSum >= 1) continue; // no hay arbitraje, suma debe ser <100%
        var profitPct = (1/impliedSum - 1) * 100;
        if (profitPct < 0.5) continue; // ignorar márgenes insignificantes (probable error de datos)

        var nameA = buildMarketLabel(a.mkt, sport);
        var nameB = buildMarketLabel(b.mkt, sport);
        var key = id+'_arb_'+a.mkt+'_'+b.mkt;

        outArb.push({key:key, sport:sport, match:match, ko:ko,
          outcomeA:nameA, bookA:a.book, oddsA:a.odds,
          outcomeB:nameB, bookB:b.book, oddsB:b.odds,
          profitPct:profitPct});

        if (profitPct >= 1) outA.push({key:'arb_'+key, type:'arb', sport:sport, match:match, ko:ko, priority: profitPct>=3?'extreme':'high',
          signal:'🎯 ARBITRAJE '+profitPct.toFixed(1)+'% GARANTIZADO',
          detail:'Apostando a "'+nameA+'" en '+a.book+' ('+a.odds.toFixed(2)+') Y a "'+nameB+'" en '+b.book+' ('+b.odds.toFixed(2)+') al mismo tiempo, ganas dinero seguro sin importar el resultado del evento. Esto no es una predicción — es matemática garantizada mientras ambas cuotas se mantengan.',
          arbDetails:{outcomeA:nameA, bookA:a.book, oddsA:a.odds, outcomeB:nameB, bookB:b.book, oddsB:b.odds, profitPct:profitPct},
          t:Date.now()});
      }
    }
  });
}

// ── MIDDLES: cuando hay un "hueco" entre las líneas de Bet365 y Winamax ──
// Ejemplo: Bet365 ofrece "Over 2.5" y Winamax ofrece "Under 3.5" en el mismo
// partido. Si el resultado final es exactamente 3 goles, GANAS LAS DOS apuestas
// (no solo no pierdes — ganas el doble). Si cae fuera de ese rango, pierdes solo
// una de las dos como en una apuesta normal. Requiere el valor de línea (point),
// que solo The Odds API nos da de momento.
function detectMiddles(id,sport,match,ko,b365,winamax,points,outArb,outA) {
  // NOTA DE DISEÑO: los middles solo se envían a outA (Alertas), NUNCA a outArb
  // (pestaña Arbitraje), a propósito. Mezclar "riesgo limitado" con "beneficio
  // garantizado" en la misma lista sería confuso y potencialmente peligroso.
  if (!points || !Object.keys(points).length) return;
  // Agrupar puntos por tipo de mercado (totals_Over, totals_Under, etc.)
  var totalsKeys = Object.keys(points).filter(function(k){ return k.indexOf('totals_')===0; });
  var overKeys = totalsKeys.filter(function(k){ return k.toLowerCase().includes('over'); });
  var underKeys = totalsKeys.filter(function(k){ return k.toLowerCase().includes('under'); });

  overKeys.forEach(function(overK) {
    underKeys.forEach(function(underK) {
      var overInfo = points[overK], underInfo = points[underK];
      if (!overInfo || !underInfo) return;
      if (overInfo.book === underInfo.book) return; // necesita ser de casas distintas (la misma casa no genera middle, son sus 2 caras del mismo mercado)

      var overPoint = overInfo.point, underPoint = underInfo.point;
      // Middle real: la línea de "Under" debe ser MAYOR que la de "Over" para crear un hueco
      var gap = underPoint - overPoint;
      if (gap <= 0) return; // no hay hueco, son líneas normales sin oportunidad

      var overOdds = overInfo.book==='Bet365' ? parseFloat(b365[overK]||0) : parseFloat(winamax[overK]||0);
      var underOdds = underInfo.book==='Bet365' ? parseFloat(b365[underK]||0) : parseFloat(winamax[underK]||0);
      if (overOdds<=1.01 || underOdds<=1.01) return;

      var key = id+'_middle_'+overK+'_'+underK;
      var winningNumbers = gap - 1; // ej: gap de 1.0 (2.5 a 3.5) = 1 resultado exacto (3) gana ambas
      if (winningNumbers < 0.5) return; // hueco demasiado pequeño para ser relevante

      outA.push({key:'mid_'+key, type:'arb', sport:sport, match:match, ko:ko, priority:'high',
        signal:'🎯 MIDDLE — hueco de '+gap.toFixed(1)+' entre líneas',
        detail:'Apostando "Más de '+overPoint+'" en '+overInfo.book+' ('+overOdds.toFixed(2)+') Y "Menos de '+underPoint+'" en '+underInfo.book+' ('+underOdds.toFixed(2)+'), si el resultado cae justo en el medio ganas AMBAS apuestas. Si cae fuera, pierdes solo una como en una apuesta normal — el riesgo es limitado y la recompensa puede ser doble.',
        arbDetails:{outcomeA:'Más de '+overPoint, bookA:overInfo.book, oddsA:overOdds, outcomeB:'Menos de '+underPoint, bookB:underInfo.book, oddsB:underOdds, profitPct:0, isMiddle:true},
        t:Date.now()});
    });
  });
}

// Quita el margen (vig) de un mercado de 2 o 3 resultados, devolviendo la
// probabilidad "justa" de cada lado. Esto es lo que hace cualquier apostador
// profesional serio antes de comparar cuotas — comparar cuotas crudas sin
// quitar el vig de la casa de referencia (aunque sea Pinnacle, que tiene vig
// bajo pero no cero) puede dar señales de valor falsas o infladas.
function noVigProb(pinMarketOdds) {
  // pinMarketOdds: objeto con las cuotas de Pinnacle para TODOS los resultados
  // de un mismo mercado (ej. {h2h_home:2.1, h2h_draw:3.4, h2h_away:3.2})
  var keys = Object.keys(pinMarketOdds);
  var impliedSum = 0;
  var implied = {};
  keys.forEach(function(k) {
    var o = parseFloat(pinMarketOdds[k]);
    if (!o || o<=1.01) return;
    implied[k] = 1/o;
    impliedSum += implied[k];
  });
  if (impliedSum <= 0) return null;
  var fair = {};
  keys.forEach(function(k) { if (implied[k]!==undefined) fair[k] = implied[k]/impliedSum; });
  return fair; // probabilidad justa de cada resultado, vig ya descontado
}

function detectEV(id,sport,match,ko,b365,winamax,pin,outV,outA,src) {
  if (!pin || !Object.keys(pin).length) return;
  // Agrupamos las claves de Pinnacle por "familia" de mercado (todo lo que
  // empiece igual hasta el último _) para poder calcular el no-vig junto.
  // Para mercados simples de 1 sola línea (sin pareja), usamos la cuota cruda
  // como fallback, igual que antes — mejor tener una señal aproximada que ninguna.
  var pinFair = noVigProb(pin) || pin;
  var allMarkets = new Set(Object.keys(b365||{}).concat(Object.keys(winamax||{})));
  // SGO en plan gratis usa fairOdds/bookOdds (aproximación estadística, NO
  // cuotas reales de Bet365/Pinnacle) — es la fuente que generó el pick
  // absurdo de Braves vs Brewers (EV+75%). Le exigimos un umbral mucho más
  // estricto que a datos reales de The Odds API / Odds-API.io.
  var isApproxSource = (src === 'SGO');
  var maxRealisticEv = isApproxSource ? 25 : 150;

  allMarkets.forEach(function(mkt) {
    var p = parseFloat(pin[mkt]);
    if (!p || p<=1.01) return;
    var name = buildMarketLabel(mkt, sport);

    var bVal = parseFloat((b365||{})[mkt]) || 0;
    var wVal = parseFloat((winamax||{})[mkt]) || 0;
    if (bVal<=1.01 && wVal<=1.01) return;

    // Probabilidad justa de Pinnacle para este resultado concreto (vig fuera).
    // Si no pudimos calcular el no-vig (ej. solo 1 resultado disponible),
    // usamos 1/cuota cruda como aproximación, igual que el método anterior.
    var pFairProb = (pinFair[mkt]!==undefined) ? pinFair[mkt] : (1/p);
    var pFairOdds = 1/pFairProb; // cuota "justa" equivalente, para mostrar igual que antes

    var bEv = bVal>1.01 ? ((bVal*pFairProb)-1)*100 : null;
    var wEv = wVal>1.01 ? ((wVal*pFairProb)-1)*100 : null;

    // Mostrar SIEMPRE ambas casas juntas si al menos una tiene EV+ >=5%, para poder comparar
    var qualifies = (bEv!==null && bEv>=5) || (wEv!==null && wEv>=5);
    if (!qualifies) return;

    var bestEv = Math.max(bEv||-999, wEv||-999);
    var key=id+'_'+mkt;
    // Diagnóstico de seguridad: umbral distinto según la fiabilidad de la
    // fuente. SGO (fairOdds aproximado) corta en 25%; fuentes con cuotas
    // reales (The Odds API, Odds-API.io) cortan en 150% como antes.
    if (bestEv > maxRealisticEv) {
      addDiag('⚠️ EV+ sospechoso descartado ('+(src||'?')+'): '+match+' mkt='+mkt+' pin='+p+' b365='+bVal+' winamax='+wVal);
      return;
    }
    outV.push({key:key,sport:sport,match:match,ko:ko,market:name,
      b365odds: bVal||null, b365ev: bEv,
      winamaxOdds: wVal||null, winamaxEv: wEv,
      pinnacle:p, ev:bestEv.toFixed(1), evNum:bestEv, src:src});

    // Registro automático para CLV: cada pick que cumple el umbral se guarda con su
    // cuota de apertura, sin que el usuario tenga que marcar nada manualmente.
    if (bEv!==null && bEv>=5) logPick(key+'_Bet365', {sport:sport, match:match, market:name, book:'Bet365', odds:bVal, pinnacle:p, ev:bEv.toFixed(1), ko:ko});
    if (wEv!==null && wEv>=5) logPick(key+'_Winamax', {sport:sport, match:match, market:name, book:'Winamax', odds:wVal, pinnacle:p, ev:wEv.toFixed(1), ko:ko});

    if (bestEv>6) {
      var bestBook = (wEv||-999) > (bEv||-999) ? 'Winamax' : 'Bet365';
      var bestOdds = bestBook==='Winamax' ? wVal : bVal;
      outA.push({key:'ev_'+key,type:'value',sport:sport,match:match,ko:ko,
        signal:'EV+'+bestEv.toFixed(1)+'% — '+name+' ('+bestBook+')',
        detail:'Apuesta: "'+name+'". '+bestBook+' paga '+bestOdds.toFixed(2)+' cuando Pinnacle lo tiene a '+p.toFixed(2)+'. La casa está equivocada. Ventana de valor abierta — actúa antes de que corrija.',
        from:p.toFixed(2),to:bestOdds.toFixed(2),bestBook:bestBook,market:name,ev:bestEv.toFixed(1),t:Date.now(),src:src});
    }
  });
}

// Sharp money: detecta movimiento en CUALQUIERA de tus dos casas
function detectSharp(id,sport,match,ko,b365,winamax,pin,witnesses,outS,outA,isMinorLeague) {
  var prev=HISTORY[id]; if (!prev) return;
  // CRÍTICO: si el partido ya ha empezado, el movimiento de cuota refleja el
  // marcador real en directo (un equipo perdiendo sube de cuota de forma
  // lógica), NO dinero sharp entrando sin motivo público. Sin este filtro,
  // el bot llegó a recomendar "EJECUTAR" apostar a un equipo que ya iba
  // perdiendo 2-6, interpretando la subida normal de cuota como señal sharp.
  if (ko) {
    var koTs = new Date(ko).getTime();
    if (!isNaN(koTs) && Date.now() >= koTs) return; // partido en directo: no es señal sharp fiable
  }
  var minsSincePrev = prev.t ? (Date.now()-prev.t)/60000 : null;
  var movesThisEvent = {}; // mkt -> {Bet365: chg, Winamax: chg} para detectar coordinación
  // Las ligas pequeñas/poco líquidas (ej. Estonia, Letonia, Islas Feroe) tienen
  // mercados menos eficientes — un movimiento del 6% ahí es mucho menos
  // significativo que el mismo 6% en NBA/Champions League, donde hay
  // muchísimo más volumen y los libros ajustan con más precisión. Exigimos
  // un umbral más alto para no confundir ruido de mercado con sharp money real.
  var minThreshold = isMinorLeague ? 8 : 5;

  [{curr:b365, prevB:prev.b365, book:'Bet365'}, {curr:winamax, prevB:prev.winamax, book:'Winamax'}].forEach(function(pair) {
    if (!pair.curr || !pair.prevB) return;
    Object.keys(pair.curr).forEach(function(mkt) {
      var c=parseFloat(pair.curr[mkt]); var o=parseFloat(pair.prevB[mkt]);
      if (!c||!o||c<=1.01||o<=1.01) return;
      var chg=((o-c)/o)*100; if (Math.abs(chg)<minThreshold) return;
      var dir=chg>0?'BAJADA':'SUBIDA';
      var name=buildMarketLabel(mkt, sport);
      var key=id+'_'+mkt+'_'+dir+'_'+pair.book;
      var absChg = Math.abs(chg);
      // Velocidad: % de cambio por minuto. Un mismo % en 3 min es mucho más
      // raro estadísticamente que en 90 min — es la señal más cercana a
      // "una sola apuesta enorme de golpe" que se puede inferir públicamente.
      var ratePerMin = (minsSincePrev && minsSincePrev>0) ? absChg/minsSincePrev : null;
      var isFast = ratePerMin!==null && ratePerMin>=3 && minsSincePrev<=15;
      // Magnitud del movimiento = proxy de tamaño de la apuesta que lo causó.
      // En ligas menores, subimos también los cortes de "high"/"extreme"
      // proporcionalmente, ya que su escala de ruido normal es mayor.
      var extremeCut = isMinorLeague ? 25 : 20;
      var highCut = isMinorLeague ? 14 : 10;
      var priority = absChg>=extremeCut ? 'extreme' : absChg>=highCut ? 'high' : 'normal';
      // Perfil de alto volumen: magnitud alta Y rápida. Es inferencia estadística,
      // NUNCA identificación de quién apostó — eso no es posible con datos públicos.
      var highVolumeProfile = (priority==='extreme' || priority==='high') && isFast;
      if (highVolumeProfile) priority = 'highvolume';

      if (!movesThisEvent[mkt]) movesThisEvent[mkt] = {};
      movesThisEvent[mkt][pair.book] = {chg:chg, dir:dir, from:o, to:c, name:name, isFast:isFast};

      outS.push({key:key,sport:sport,match:match,ko:ko,market:name,book:pair.book,from:o.toFixed(2),to:c.toFixed(2),chg:absChg.toFixed(1),dir:dir,priority:priority,t:Date.now()});
      if (absChg>4) {
        var sig = highVolumeProfile ? '🏆 PERFIL ALTO VOLUMEN — ' : (priority==='extreme'?'🚨 MOVIMIENTO MASIVO — ':'');
        var det = highVolumeProfile
          ? 'Movimiento de '+absChg.toFixed(1)+'% en solo '+minsSincePrev.toFixed(0)+' min en '+pair.book+'. Esta combinación de magnitud y velocidad es estadísticamente rara en apuestas normales acumuladas — el patrón es compatible con una operación de alto volumen. Importante: esto es una inferencia estadística sobre el PATRÓN del movimiento, no una identificación de quién apostó; esa información no es pública en ningún sitio. '
          : (priority==='extreme'?'Movimiento de esta magnitud en una sola actualización es propio de apuestas muy grandes (cinco-seis cifras), del tipo que mueven los sindicatos profesionales. ':'');
        outA.push({key:'sh_'+key,type:'sharp',sport:sport,match:match,ko:ko,market:name,priority:priority,
          signal:sig+dir+' '+absChg.toFixed(1)+'% en '+pair.book+' — '+name,
          detail:det+'Cuota de '+pair.book+' movida de '+o.toFixed(2)+' a '+c.toFixed(2)+'. Sin noticia pública que lo justifique = dinero entrando con fuerza. Actúa antes de que baje más.',
          from:o.toFixed(2),to:c.toFixed(2),book:pair.book,chg:absChg.toFixed(1),dir:dir,t:Date.now()});
      }
    });
  });

  // ── SEÑAL COORDINADA: ambas casas se mueven en la misma dirección ──
  // Esto es más fiable que un movimiento aislado — indica que el mercado
  // global está corrigiendo, no solo una casa concreta. Si además es rápida
  // y de magnitud extrema, es la inferencia más fuerte posible con datos públicos.
  Object.keys(movesThisEvent).forEach(function(mkt) {
    var m = movesThisEvent[mkt];
    // ── STEAM MOVE: Pinnacle + Bet365 + Winamax se mueven a la vez en la
    // misma dirección. Esta es la señal más fuerte que existe con datos
    // públicos — el mercado entero (sharp y retail) está de acuerdo en que
    // algo ha cambiado. En la jerga profesional esto se llama "steam move":
    // varios libros corrigiendo simultáneamente tras la misma información.
    var pc = pin ? parseFloat(pin[mkt]) : null;
    var po = (prev && prev.pin) ? parseFloat(prev.pin[mkt]) : null;
    var pinMoveOk = pc && po && pc>1.01 && po>1.01;
    var pinChgSteam = pinMoveOk ? ((po-pc)/po)*100 : null;
    var pinDirSteam = pinChgSteam!==null && pinChgSteam>0 ? 'BAJADA' : (pinChgSteam!==null ? 'SUBIDA' : null);
    if (m.Bet365 && m.Winamax && m.Bet365.dir === m.Winamax.dir && pinDirSteam === m.Bet365.dir && Math.abs(pinChgSteam) >= 3) {
      var steamAvg = (Math.abs(m.Bet365.chg) + Math.abs(m.Winamax.chg) + Math.abs(pinChgSteam)) / 3;
      // ── CASAS TESTIGO: refuerzo adicional, no usado para apostar. Si otras
      // casas (que Alvaro no usa) también confirman la misma dirección, el
      // steam move pasa de "3 fuentes coinciden" a "N fuentes coinciden" —
      // cuantas más, menos probable que sea ruido de una sola casa.
      var witnessConfirms = 0;
      var prevW = (prev && prev.witnesses) ? prev.witnesses : {};
      Object.keys(witnesses||{}).forEach(function(wKey) {
        var wc = parseFloat((witnesses[wKey]||{})[mkt]);
        var wo = parseFloat((prevW[wKey]||{})[mkt]);
        if (!wc||!wo||wc<=1.01||wo<=1.01) return;
        var wChg = ((wo-wc)/wo)*100;
        var wDir = wChg>0 ? 'BAJADA' : 'SUBIDA';
        if (wDir === m.Bet365.dir && Math.abs(wChg) >= 3) witnessConfirms++;
      });
      var witnessTxt = witnessConfirms>0 ? ' + '+witnessConfirms+' casa'+(witnessConfirms>1?'s':'')+' testigo más confirma'+(witnessConfirms>1?'n':'') : '';
      outA.push({key:'steam_'+id+'_'+mkt, type:'sharp', sport:sport, match:match, ko:ko, market:m.Bet365.name, priority:'extreme',
        signal:'⚡🌪️ STEAM MOVE — Pinnacle + Bet365 + Winamax'+(witnessConfirms>0?' (+'+witnessConfirms+' más)':'')+' se mueven juntos',
        detail:'Las tres referencias (el libro sharp y tus dos casas) se mueven en la misma dirección a la vez: Pinnacle '+Math.abs(pinChgSteam).toFixed(1)+'%, Bet365 '+Math.abs(m.Bet365.chg).toFixed(1)+'%, Winamax '+Math.abs(m.Winamax.chg).toFixed(1)+'%'+witnessTxt+'. Es la señal más fiable posible con datos públicos: todo el mercado está corrigiendo a la vez, lo que normalmente indica información real (lesión, alineación, lo que sea) ya incorporada en todos los libros. No hay duda razonable de que algo ha cambiado.',
        from:m.Bet365.from.toFixed(2), to:m.Bet365.to.toFixed(2), chg:steamAvg.toFixed(1), dir:m.Bet365.dir, steam:true, witnessConfirms:witnessConfirms, t:Date.now()});
    }
    if (m.Bet365 && m.Winamax && m.Bet365.dir === m.Winamax.dir) {
      var avgChg = (Math.abs(m.Bet365.chg) + Math.abs(m.Winamax.chg)) / 2;
      var dir = m.Bet365.dir;
      var name = m.Bet365.name;
      var bothFast = m.Bet365.isFast && m.Winamax.isFast;
      var coordExtreme = isMinorLeague ? 20 : 15;
      var coordHigh = isMinorLeague ? 11 : 8;
      var coordPriority = avgChg>=coordExtreme ? 'extreme' : avgChg>=coordHigh ? 'high' : 'normal';
      if (bothFast && (coordPriority==='extreme'||coordPriority==='high')) coordPriority = 'highvolume';
      var sig = coordPriority==='highvolume' ? '🏆🔥 PERFIL ALTO VOLUMEN COORDINADO — ' : (coordPriority==='extreme'?'🚨🔥 INVERSIÓN MASIVA COORDINADA — ':'🔥 SEÑAL COORDINADA — ');
      var det = coordPriority==='highvolume'
        ? 'Ambas casas se mueven a la vez Y muy rápido ('+minsSincePrev.toFixed(0)+' min). Es el patrón público más cercano a una operación de alto volumen coordinada en varios libros — pero sigue siendo inferencia estadística sobre el patrón, no identificación de quién está detrás. '
        : (coordPriority==='extreme'?'Esto es lo más cercano a confirmar que hay dinero grande moviendo el mercado ahora mismo: ':'');
      outA.push({key:'coord_'+id+'_'+mkt+'_'+dir, type:'sharp', sport:sport, match:match, ko:ko, market:name, priority:coordPriority,
        signal:sig+dir+' en Bet365 Y Winamax — '+name,
        detail:det+'Ambas casas se mueven en la misma dirección a la vez: Bet365 '+Math.abs(m.Bet365.chg).toFixed(1)+'%, Winamax '+Math.abs(m.Winamax.chg).toFixed(1)+'%. Esto indica que el mercado en general está corrigiendo, no solo una casa — señal mucho más fiable que un movimiento aislado.',
        from:m.Bet365.from.toFixed(2), to:m.Bet365.to.toFixed(2), chg:avgChg.toFixed(1), dir:dir, coordinated:true, t:Date.now()});
    }
  });
}

// ── DETECCIÓN DE SUSPENSIÓN DE MERCADO ─────────────────────
// Cuando un mercado que existía en el escaneo anterior desaparece del
// actual, suele indicar que la casa lo ha suspendido temporalmente para
// recalcular tras una apuesta grande — señal fuerte según método Walters.
// ── DIVERGENCIA CON PINNACLE: proxy de "Reverse Line Movement" ────────────
// El RLM real (línea moviéndose contra el % de apuestas públicas) requiere
// datos de % de apuestas que ninguna API gratuita nos da. Pero hay un proxy
// fiable: Pinnacle es el libro sharp de referencia mundial — si Bet365 o
// Winamax se mueven en una dirección y Pinnacle se mueve en la OPUESTA (o no
// se mueve nada), es la señal pública más cercana a "el mercado retail está
// equivocado y el libro profesional no lo sigue" — la misma lógica de fondo
// que el RLM, pero con datos que sí podemos obtener.
function detectDivergence(id,sport,match,ko,b365,winamax,pin,outA) {
  var prev=HISTORY[id]; if (!prev || !prev.pin || !Object.keys(prev.pin).length) return;
  if (!pin || !Object.keys(pin).length) return;

  [{curr:b365, prevB:prev.b365, book:'Bet365'}, {curr:winamax, prevB:prev.winamax, book:'Winamax'}].forEach(function(pair) {
    if (!pair.curr || !pair.prevB) return;
    Object.keys(pair.curr).forEach(function(mkt) {
      var c=parseFloat(pair.curr[mkt]); var o=parseFloat(pair.prevB[mkt]);
      var pc=parseFloat(pin[mkt]); var po=parseFloat(prev.pin[mkt]);
      if (!c||!o||c<=1.01||o<=1.01||!pc||!po||pc<=1.01||po<=1.01) return;

      var bookChg = ((o-c)/o)*100; // positivo = bajó (más probable)
      var pinChg = ((po-pc)/po)*100;

      // ── SEÑAL DE VENTANA: Pinnacle (sharp) ya se movió, la casa retail
      // (Bet365/Winamax) todavía no ha actualizado su cuota. Esto es lo más
      // parecido a "saber algo antes que el resto": el mercado profesional ya
      // ha incorporado la información (lesión, alineación, lo que sea la haya
      // causado) pero la casa pública aún ofrece el precio viejo. Es una
      // ventana temporal — en cuanto la casa actualice, esta cuota desaparece.
      // Umbral de Pinnacle más bajo (4%) que el de las casas (5%) porque al
      // ser el libro más eficiente, sus movimientos son menos ruidosos: un
      // 4% en Pinnacle pesa más que un 4% en Bet365.
      if (Math.abs(pinChg) >= 4 && Math.abs(bookChg) < 2.5) {
        var pinDir = pinChg>0 ? 'BAJADA' : 'SUBIDA'; // dirección de la probabilidad de ese resultado
        var staleName = buildMarketLabel(mkt, sport);
        var windowPriority = Math.abs(pinChg)>=8 ? 'extreme' : Math.abs(pinChg)>=6 ? 'high' : 'normal';
        outA.push({key:'lead_'+id+'_'+mkt+'_'+pair.book, type:'sharp', sport:sport, match:match, ko:ko, market:staleName, priority:windowPriority,
          signal:'🎯 VENTANA DE OPORTUNIDAD — Pinnacle se adelantó, '+pair.book+' aún no',
          detail:'Pinnacle (el mercado profesional) movió su cuota '+Math.abs(pinChg).toFixed(1)+'% ('+pinDir+' de probabilidad) en '+staleName+', pero '+pair.book+' sigue ofreciendo prácticamente el mismo precio ('+Math.abs(bookChg).toFixed(1)+'% de cambio). El mercado sharp puede haber incorporado ya información que '+pair.book+' aún no ha procesado. Es una ventana temporal: en el próximo escaneo, '+pair.book+' probablemente corrija hacia el precio de Pinnacle — actúa antes de que eso pase.',
          from:o.toFixed(2), to:c.toFixed(2), book:pair.book, chg:Math.abs(pinChg).toFixed(1), dir:pinDir, leadingEdge:true, t:Date.now()});
      }

      if (Math.abs(bookChg) < 5) return; // necesitamos un movimiento real en la casa

      // Divergencia: la casa se mueve con fuerza pero Pinnacle apenas se
      // mueve o se mueve en dirección contraria. Esto sugiere que el
      // movimiento en la casa es ruido propio (o apuesta grande aislada en
      // esa casa concreta) en vez de una corrección real del mercado sharp.
      var divergence = bookChg - pinChg;
      if (Math.abs(divergence) < 6) return; // umbral: diferencia significativa

      var name = buildMarketLabel(mkt, sport);
      var sameDirection = (bookChg>0 && pinChg>0) || (bookChg<0 && pinChg<0);
      var isOpposite = (bookChg>0 && pinChg<0) || (bookChg<0 && pinChg>0);

      if (isOpposite) {
        outA.push({key:'div_'+id+'_'+mkt+'_'+pair.book, type:'sharp', sport:sport, match:match, ko:ko, market:name, priority:'high',
          signal:'⚠️ DIVERGENCIA CON PINNACLE — '+pair.book+' vs mercado sharp en '+name,
          detail:pair.book+' se movió '+Math.abs(bookChg).toFixed(1)+'% en una dirección mientras Pinnacle (la referencia sharp) se movió al revés. Esto sugiere que el movimiento en '+pair.book+' puede ser ruido propio de esa casa, no una señal de mercado real — actúa con más cautela que en un movimiento coordinado.',
          from:o.toFixed(2), to:c.toFixed(2), book:pair.book, chg:Math.abs(bookChg).toFixed(1), dir:bookChg>0?'BAJADA':'SUBIDA', t:Date.now()});
      } else if (!sameDirection || Math.abs(divergence) >= 10) {
        outA.push({key:'div_'+id+'_'+mkt+'_'+pair.book, type:'sharp', sport:sport, match:match, ko:ko, market:name, priority:'normal',
          signal:'📐 '+pair.book+' se adelanta a Pinnacle en '+name,
          detail:pair.book+' se movió '+Math.abs(bookChg).toFixed(1)+'% mientras Pinnacle apenas reaccionó ('+Math.abs(pinChg).toFixed(1)+'%). Puede que '+pair.book+' esté reaccionando a algo que el mercado sharp aún no ha incorporado — vigilar si Pinnacle confirma el movimiento en el próximo escaneo antes de actuar con fuerza.',
          from:o.toFixed(2), to:c.toFixed(2), book:pair.book, chg:Math.abs(bookChg).toFixed(1), dir:bookChg>0?'BAJADA':'SUBIDA', t:Date.now()});
      }
    });
  });
}

function detectSuspension(id,sport,match,ko,b365,winamax,outA) {
  var prev=HISTORY[id]; if (!prev) return;
  [{curr:b365, prevB:prev.b365, book:'Bet365'}, {curr:winamax, prevB:prev.winamax, book:'Winamax'}].forEach(function(pair) {
    if (!pair.prevB) return;
    // Evitar falso positivo: si esta casa no devolvió NINGÚN mercado en este escaneo,
    // probablemente es un fallo de red nuestro, no una suspensión real de la casa.
    var bookRespondedThisScan = pair.curr && Object.keys(pair.curr).length > 0;
    if (!bookRespondedThisScan) return;
    Object.keys(pair.prevB).forEach(function(mkt) {
      var hadBefore = parseFloat(pair.prevB[mkt]) > 1.01;
      var hasNow = parseFloat(pair.curr[mkt]) > 1.01;
      if (hadBefore && !hasNow) {
        var name=buildMarketLabel(mkt, sport);
        outA.push({key:'susp_'+id+'_'+mkt+'_'+pair.book, type:'sharp', sport:sport, match:match, ko:ko, market:name,
          signal:'⏸️ MERCADO SUSPENDIDO en '+pair.book+' — '+name,
          detail:pair.book+' ha retirado temporalmente esta cuota concreta (estaba en '+parseFloat(pair.prevB[mkt]).toFixed(2)+'), mientras otros mercados de la misma casa siguen activos. Las casas suspenden mercados cuando reciben una apuesta grande y necesitan recalcular el precio. Vigila si reaparece con una cuota distinta.',
          from:parseFloat(pair.prevB[mkt]).toFixed(2), to:'suspendido', book:pair.book, suspended:true, t:Date.now()});
      }
    });
  });
}

function ago(ts) {
  if(!ts) return ''; var s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'hace '+s+'s'; if(s<3600) return 'hace '+Math.floor(s/60)+'min'; return 'hace '+Math.floor(s/3600)+'h';
}
function fko(iso) {
  if(!iso) return '';
  try{
    var d=new Date(iso);
    var today = new Date();
    var isToday = d.toDateString() === today.toDateString();
    var tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
    var isTomorrow = d.toDateString() === tomorrow.toDateString();
    var datePart = isToday ? 'Hoy' : isTomorrow ? 'Mañana' : d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
    var timePart = d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    return datePart+' '+timePart+'h';
  }catch(e){return '';}
}

// ── BOT DE DECISIÓN: puntúa cada alerta por fiabilidad real, no solo por
// magnitud bruta. Una alerta con coordinación entre casas + confirmación de
// Pinnacle es mucho más fiable que un EV+ enorme aislado que podría ser
// ruido de datos. Esto es lo más cerca que podemos llegar de "qué apostaría
// un profesional primero" con datos públicos.
function scoreAlertConfidence(a) {
  var score = 0;
  var reasons = [];

  if (a.type === 'value') {
    var ev = parseFloat(a.ev||0);
    // EV+ moderado (5-30%) es más creíble que uno extremo; >80% casi siempre
    // es señal de datos mal cruzados entre fuentes, ya lo hemos visto.
    if (ev >= 5 && ev <= 30) { score += 40; reasons.push('EV+ en rango creíble'); }
    else if (ev > 30 && ev <= 80) { score += 25; reasons.push('EV+ alto, verificar manualmente'); }
    else { score += 10; reasons.push('EV+ extremo, alta probabilidad de ruido de datos'); }
    // SGO en plan gratis usa fairOdds aproximado (regresión estadística), NO
    // una comparación real entre dos casas de apuestas reales — penalizamos
    // fuerte porque no es el mismo tipo de señal que The Odds API/Odds-API.io.
    if (a.src === 'SGO') { score -= 25; reasons.push('fuente aproximada (SGO), no cuota real de casa'); }
  }

  if (a.type === 'sharp') {
    if (a.coordinated) { score += 35; reasons.push('Bet365 y Winamax coordinados'); }
    else { score += 15; reasons.push('movimiento en una sola casa'); }
    if (a.priority === 'highvolume') { score += 25; reasons.push('magnitud + velocidad inusuales'); }
    else if (a.priority === 'extreme') { score += 15; reasons.push('magnitud extrema'); }
    else if (a.priority === 'high') { score += 8; }
  }

  if (a.suspended) { score += 5; reasons.push('mercado suspendido, señal débil hasta que reabra'); }

  // Frescura: una señal de hace 2 minutos vale más que una de hace 40
  var ageMin = a.t ? (Date.now()-a.t)/60000 : 999;
  if (ageMin <= 5) { score += 15; reasons.push('muy reciente'); }
  else if (ageMin <= 20) { score += 5; }
  else { score -= 10; reasons.push('ya no es reciente'); }

  return {score: Math.max(0, Math.min(100, score)), reasons: reasons};
}

function pgBestBet() {
  if (!ALERTS.length) return '';
  var scored = ALERTS.map(function(a){
    var s = scoreAlertConfidence(a);
    return Object.assign({}, a, {confidence: s.score, reasons: s.reasons});
  }).sort(function(a,b){ return b.confidence - a.confidence; });

  var top = scored[0];
  if (!top || top.confidence < 30) return ''; // nada con suficiente fiabilidad ahora mismo

  var col = top.confidence>=70 ? 'var(--value)' : top.confidence>=50 ? 'var(--warn)' : 'var(--muted)';
  var label = top.confidence>=70 ? '🤖 MEJOR APUESTA AHORA — alta confianza' : top.confidence>=50 ? '🤖 MEJOR OPCIÓN AHORA — confianza moderada' : '🤖 ÚNICA OPCIÓN AHORA — confianza baja, verificar antes';

  return '<div class="card" style="border:2px solid '+col+';box-shadow:0 0 18px '+col+'40;margin-bottom:14px">'
    +'<div style="font-size:11px;font-weight:900;color:'+col+';letter-spacing:.6px;margin-bottom:8px">'+label+'</div>'
    +'<div class="mt">'+(top.sport||'')+' '+(top.match||'').replace('vs',' vs ')+'</div>'
    +'<div style="font-size:13px;color:var(--text);font-weight:700;margin:6px 0">'+(top.signal||'')+'</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin:10px 0">'
    +'<div style="flex:1;background:var(--bg3);border-radius:8px;height:8px;overflow:hidden"><div style="height:100%;width:'+top.confidence+'%;background:'+col+';border-radius:8px"></div></div>'

    +'</div>'
    +'<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Por qué: '+top.reasons.join(' · ')+'</div>'

    +'</div>';
}
