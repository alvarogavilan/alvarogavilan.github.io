var BANKROLL = parseFloat(localStorage.getItem('smp_bankroll')) || 350;
var KELLY_FRACTION = 0.25; // Kelly fraccionado al 25% вЂ” mucho mГЎs seguro que Kelly completo

function setBankroll(val) {

// Kelly Criterion: f* = (bp - q) / b
// b = cuota decimal - 1 (ganancia neta por unidad apostada)
// p = probabilidad real estimada de ganar (derivada de la cuota de Pinnacle, la sharp)
// q = 1 - p
function calcStake(oddsBet365, oddsPinnacle) {
  if (!oddsBet365 || !oddsPinnacle || oddsBet365<=1 || oddsPinnacle<=1) return null;
  var pTrue = 1 / oddsPinnacle; // Pinnacle como estimaciГіn de probabilidad real (sin margen propio, aproximado)
  var b = oddsBet365 - 1;
  var q = 1 - pTrue;
  var kelly = (b*pTrue - q) / b;
  if (kelly <= 0) return null;
  var fraction = kelly * KELLY_FRACTION;
  var stake = BANKROLL * fraction;
  // Cap de seguridad: nunca mГЎs del 5% de la banca en una sola apuesta, ni menos de 1в‚¬
  stake = Math.min(stake, BANKROLL*0.05);
  stake = Math.max(stake, 1);
  return {stake: stake, pct: (stake/BANKROLL*100), kellyFull: kelly*100};
}

// Registra un pick EV+ la primera vez que se ve, con su cuota inicial.
// Si ya existe (mismo key), actualiza la "Гєltima cuota vista" para poder

function logPick(pickKey, data) {
  var existing = PICK_LOG.find(function(p){ return p.key===pickKey; });
  if (existing) {
    existing.lastOdds = data.odds;
    existing.lastSeen = Date.now();
    existing.timesSeen = (existing.timesSeen||1) + 1;
  } else {
    PICK_LOG.push({
      key: pickKey, sport: data.sport, match: data.match, market: data.market,

    });
  }
  savePickLog();
}

// Calcula el CLV real de un pick: Вїla cuota subiГі o bajГі desde que lo vimos
// hasta la Гєltima vez que tuvimos datos? Si bajГі (para el lado que apostarГ­as),
// significa que el mercado confirmГі que tu pick tenГ­a razГіn.
function calcCLV(pick) {
  if (!pick.openOdds || !pick.lastOdds || pick.openOdds===pick.lastOdds) return null;
  var clv = ((pick.openOdds - pick.lastOdds) / pick.openOdds) * 100;
  return clv; // positivo = la cuota bajГі tras detectarlo = el mercado confirmГі tu valor
}

async function fetchWithTimeout(url, ms) {
  var ctrl = new AbortController();
  var tid = setTimeout(function(){ctrl.abort();}, ms||15000);
  try {
    var r = await fetch(url, {signal: ctrl.signal, mode:'cors'});
    clearTimeout(tid);
    return r;
  } catch(e) { clearTimeout(tid); throw e; }
}

async function proxyFetch(targetUrl, label, apiKeyForHeader) {
  addDiag('в†’ '+label);

  // Try Cloudflare Worker first (if configured)
  if (WORKER_URL && WORKER_URL !== 'YOUR-WORKER-URL') {
    try {
      var fullUrl = WORKER_URL+'?url='+encodeURIComponent(targetUrl);
      if (apiKeyForHeader) fullUrl += '&apikeyheader='+encodeURIComponent(apiKeyForHeader);
      var r = await fetchWithTimeout(fullUrl, 15000);
      if (r.ok) {
        var txt = await r.text();
        if (txt && txt.length > 2) {
          try {
            var j=JSON.parse(txt);
            addDiag('вњ“ '+label+' ('+txt.length+'b)');
            return j;

          }

        }
      } else {
        var errTxt = '';
        try { errTxt = await r.text(); } catch(e){}
        addDiag('  Worker HTTP '+r.status+': '+errTxt.substring(0,70));

    var pName = i===0?'corsproxy.io':'AllOrigins';
    try {
      var proxied = FALLBACK_PROXIES[i](targetUrl);
      addDiag('  via '+pName+'...');
      var r2 = await fetchWithTimeout(proxied, 15000);
      if (!r2.ok) { addDiag('  вњ— '+pName+' HTTP '+r2.status); ERRORS.push({src:label,code:r2.status,msg:pName,t:Date.now()}); continue; }
      var txt2 = await r2.text();
      if (!txt2||txt2.length<3) { addDiag('  вњ— '+pName+' vacГ­o'); continue; }
      try {
        var j2 = JSON.parse(txt2);
        if (j2.contents !== undefined) { try{j2=JSON.parse(j2.contents);}catch(e){j2=j2.contents;} }
        addDiag('вњ“ '+label+' ('+pName+')');
        return j2;
      } catch(e) { addDiag('  вњ— JSON error: '+e.message.substring(0,30)); ERRORS.push({src:label,msg:'JSON:'+e.message.substring(0,40),t:Date.now()}); }
    } catch(e) {
      var em=e.name==='AbortError'?'timeout 15s':e.message.substring(0,35);
      addDiag('  вњ— '+pName+': '+em);
      ERRORS.push({src:label,msg:pName+': '+em,t:Date.now()});
    }
  }
  addDiag('вњ— '+label+' вЂ” todos los proxies fallaron');
  return null;
}

// в”Ђв”Ђ DIRECT API CALLS (via CORS proxy) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function fetchTheOdds() {
  // Step 1: get active sports (free, no quota cost) - cache it
  if (!window._cachedSports || Date.now() - (window._sportsCacheTime||0) > 86400000) {
    var sportsUrl = 'https://api.the-odds-api.com/v4/sports/?apiKey=' + KEYS.theOdds;
    var sportsData = await proxyFetch(sportsUrl, 'The Odds API (sports list)');
    if (sportsData && Array.isArray(sportsData)) {
      window._cachedSports = sportsData.filter(function(s){return s.active;}).map(function(s){return s.key;});
      window._sportsCacheTime = Date.now();
      addDiag('  Deportes activos detectados: '+window._cachedSports.length);
    }
  }
  var all = window._cachedSports || [];

  // En vez de elegir SOLO 1 liga por categorГ­a, tomamos VARIAS de cada una.
  // AsГ­ si la NBA estГЎ fuera de temporada, aГєn consultamos WNBA, EuroLiga, etc.
  // PRESUPUESTO REAL: 500 peticiones/mes Г· refresco cada 8h (в‰€90 escaneos/mes)
  // = mГЎximo ~5 ligas por escaneo para no agotar la cuota antes de fin de mes.
  // Antes esto pedГ­a 23 ligas por escaneo, lo que agotaba la cuota mensual
  // en menos de 2 dГ­as de uso real. Priorizamos las ligas de mayor volumen.
  var soccerKeys = all.filter(function(k){
    return k.indexOf('soccer_')===0 && (
      k.includes('epl') || k.includes('la_liga')
    );
  }).slice(0,2);
  var basketKeys = all.filter(function(k){return k.indexOf('basketball_')===0;}).slice(0,1);
  var tennisKeys = all.filter(function(k){return k.indexOf('tennis_')===0;}).slice(0,1);
  var hockeyKeys = [];
  var baseballKeys = [];
  var amFootballKeys = all.filter(function(k){return k.indexOf('americanfootball_')===0;}).slice(0,1);
  var mmaKeys = [];

  var targets = soccerKeys.concat(basketKeys, tennisKeys, hockeyKeys, baseballKeys, amFootballKeys, mmaKeys);
  if (!targets.length) targets = all.slice(0,5); // fallback: lo que sea que estГ© activo
  addDiag('  Ligas a consultar: '+targets.length+' ('+targets.slice(0,5).join(', ')+(targets.length>5?'...':'')+')');

  var allResults = [];
  for (var i=0; i<targets.length; i++) {
    var sportKey = targets[i];
    var sportIcon = sportKey.indexOf('soccer')===0?'вљЅ' : sportKey.indexOf('basketball')===0?'рџЏЂ' : sportKey.indexOf('tennis')===0?'рџЋѕ' : sportKey.indexOf('icehockey')===0?'рџЏ’' : sportKey.indexOf('baseball')===0?'вљѕ' : sportKey.indexOf('americanfootball')===0?'рџЏ€' : sportKey.indexOf('mma')===0?'рџҐЉ' : 'рџЏ†';

    var now = new Date();
    var future = new Date(now.getTime() + 5*24*60*60*1000); // prГіximos 5 dГ­as
    var url = 'https://api.the-odds-api.com/v4/sports/' + sportKey + '/odds/?apiKey='
      + KEYS.theOdds + '&regions=eu,uk,fr&markets=h2h&oddsFormat=decimal'
      + '&commenceTimeTo=' + future.toISOString().split('.')[0] + 'Z';
    var data = await proxyFetch(url, 'The Odds API ('+sportKey+')');
    if (!data || !Array.isArray(data)) continue;
    apiStatus.theOdds = 'ok';

    data.forEach(function(ev) {
      var b365={}, winamax={}, pin={}, points={};
      (ev.bookmakers||[]).forEach(function(bm) {
        var n=(bm.key||'').toLowerCase();
        var tgt = n.includes('pinnacle') ? pin : n.includes('winamax') ? winamax : n.includes('bet365') ? b365 : null;
        if (!tgt) return; // skip bookmakers we don't track (keeps data relevant to user's actual books)
        (bm.markets||[]).forEach(function(mkt) {
          (mkt.outcomes||[]).forEach(function(o) {
            var k = (mkt.key||'h2h')+'_'+(o.name||'');
            if (tgt[k]===undefined) tgt[k] = parseFloat(o.price||0);
            // Guardar el punto/lГ­nea (ej: 2.5 en "Over 2.5") para detectar middles despuГ©s
            if (o.point!==undefined && !points[k]) points[k] = {point:o.point, book: n.includes('winamax')?'Winamax':n.includes('bet365')?'Bet365':n.includes('pinnacle')?'Pinnacle':n};
          });
        });
      });
      if (Object.keys(b365).length>0 || Object.keys(winamax).length>0 || Object.keys(pin).length>0) {
        allResults.push({id:ev.id, sport:sportIcon, match:(ev.home_team||'')+' vs '+(ev.away_team||''), comp:ev.sport_title||sportKey, ko:ev.commence_time, b365:b365, winamax:winamax, pin:pin, points:points, src:'TheOddsAPI'});
      }
    });
  }
  return allResults;
}

async function fetchOddsApiIo() {
  // Plan gratis real: 5.000 peticiones/HORA (no por mes) вЂ” mucho margen para
  // cubrir varios deportes, no solo fГєtbol como antes. Ampliamos a los
  // deportes de mayor volumen + un hueco para los que pidiГі el usuario
  // (hockey, esports). Tenis de mesa/vГіley no estГЎn confirmados en su
  // catГЎlogo pГєblico, asГ­ que no los forzamos para evitar peticiones vacГ­as.
  var SPORTS_TARGET = ['football', 'basketball', 'tennis', 'icehockey'];
  var allResults = [];

  for (var s = 0; s < SPORTS_TARGET.length; s++) {
    var sport = SPORTS_TARGET[s];
    var sportIcon = sport==='football'?'вљЅ' : sport==='basketball'?'рџЏЂ' : sport==='tennis'?'рџЋѕ' : sport==='icehockey'?'рџЏ’' : 'рџЏ†';

    var leaguesUrl = 'https://api.odds-api.io/v3/leagues?apiKey=' + KEYS.oddsApi + '&sport=' + sport + '&all=true';
    var leagues = await proxyFetch(leaguesUrl, 'Odds-API.io (leagues '+sport+')');
    if (!leagues || !Array.isArray(leagues) || !leagues.length) continue;

    var preferred = ['england-premier-league','spain-la-liga','world-cup','uefa-champions-league','italy-serie-a','nba','atp','wta'];
    var league = leagues.find(function(l){ return preferred.includes(l.slug) && (l.eventCount===undefined || l.eventCount>0); })
              || leagues.find(function(l){ return l.eventCount>0; })
              || leagues[0];
    if (!league || !league.slug) continue;

    var eventsUrl = 'https://api.odds-api.io/v3/events?apiKey=' + KEYS.oddsApi
      + '&sport=' + sport + '&league=' + league.slug + '&status=pending&bookmaker=Bet365';
    var events = await proxyFetch(eventsUrl, 'Odds-API.io (events '+sport+')');
    if (!events || !Array.isArray(events) || !events.length) continue;
    apiStatus.oddsApi = 'ok';

    var toFetch = events.slice(0, 3); // 3 eventos por deporte para repartir bien la cuota
    for (var i = 0; i < toFetch.length; i++) {
      var ev = toFetch[i];
      var oddsUrl = 'https://api.odds-api.io/v3/odds?apiKey=' + KEYS.oddsApi
        + '&eventId=' + ev.id + '&bookmakers=Bet365,Pinnacle';
      var oddsData = await proxyFetch(oddsUrl, 'Odds-API.io (odds '+sport+')');
      if (!oddsData) continue;

      var b365={}, pin={};
      var bms = oddsData.bookmakers || oddsData;
      if (Array.isArray(bms)) {
        bms.forEach(function(bm) {
          var n=(bm.name||bm.bookmaker||'').toLowerCase();
          var tgt = n.includes('bet365')?b365 : n.includes('pinnacle')?pin : null;
          if (!tgt) return;
          (bm.markets||bm.odds||[]).forEach(function(mkt) {
            if (mkt.outcomes) {
              mkt.outcomes.forEach(function(o){ tgt['h2h_'+(o.name||'')] = parseFloat(o.price||o.odds||0); });
            } else if (mkt.home !== undefined) {
              tgt['h2h_home']=parseFloat(mkt.home||0); tgt['h2h_away']=parseFloat(mkt.away||0);
              if (mkt.draw) tgt['h2h_draw']=parseFloat(mkt.draw);
            }
          });
        });
      }
      if (Object.keys(b365).length || Object.keys(pin).length) {
        allResults.push({id:ev.id, sport:sportIcon, match:(ev.home||'')+' vs '+(ev.away||''), comp:league.name||'', ko:ev.starts||ev.startTime, b365:b365, pin:pin, src:'OddsAPI.io'});
      }
    }
  }
  return allResults;
}

async function fetchSGO() {

  var url = 'https://api.sportsgameodds.com/v2/events?leagueID=NBA,NFL,MLB,NHL,WNBA,UFC&oddsAvailable=true&limit=20';

  var events = data.data || data.events || (Array.isArray(data)?data:[]);

  addDiag('  SGO: '+events.length+' eventos crudos recibidos');

  return events.slice(0,15).map(function(ev) {
    var b365={}, pin={};
    var homeT = (ev.teams && ev.teams.home && ev.teams.home.names) ? ev.teams.home.names.medium : (ev.homeTeam||'Home');
    var awayT = (ev.teams && ev.teams.away && ev.teams.away.names) ? ev.teams.away.names.medium : (ev.awayTeam||'Away');

          if (!bk || bk.odds===undefined) return;
          var bkLower = bkName.toLowerCase();
          var tgt = bkLower.includes('pinnacle') ? pin : b365;
          if (tgt['h2h_'+side]===undefined) tgt['h2h_'+side] = parseFloat(bk.odds);

    return {id:ev.eventID||ev.id, sport:sp, match:homeT+' vs '+awayT, comp:lg, ko:(ev.status&&ev.status.startsTime)||ev.startTime, b365:b365, pin:pin, src:'SGO'};

}

// в”Ђв”Ђ ESPORTS via OddsPapi (CS2, LoL, Dota 2, Valorant) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Misma API que ya usamos para Pinnacle fГєtbol, mismo plan gratis (250/mes),
// sin coste adicional. Verificado: sportId 17=CS2, 18=LoL, 16=Dota2, 61=Valorant.
// Market 171 = Match Winner. Pinnacle Y Bet365 vienen en la misma respuesta,
// lo que permite calcular EV+ real para esports, no solo mostrar datos sueltos.
async function fetchOddsPapiEsports() {
  // CS2 (mayor volumen, 2 partidos/escaneo) + LoL (segundo tГ­tulo, 1 partido/escaneo)
  // Presupuesto recalculado: fГєtbol 50%, CS2 30%, LoL 20% de la cuota compartida.
  var ESPORT_CONFIG = [
    {id:17, icon:'рџЋЇ CS2', maxFixtures:2},
    {id:18, icon:'рџЋ® LoL', maxFixtures:1}
  ];
  var allResults = [];

  for (var c=0; c<ESPORT_CONFIG.length; c++) {
    var cfg = ESPORT_CONFIG[c];
    var today = new Date().toISOString().split('T')[0];
    var weekOut = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
    var fixturesUrl = 'https://api.oddspapi.io/v4/fixtures?sportId='+cfg.id+'&from='+today+'&to='+weekOut+'&hasOdds=true&apiKey=' + KEYS.oddsPapi;
    var fixtures = await proxyFetch(fixturesUrl, 'OddsPapi Esports ('+cfg.icon+')');
    if (!fixtures || !Array.isArray(fixtures) || !fixtures.length) continue;

    fixtures.slice(0,cfg.maxFixtures).forEach(function(fx) { fx._sportIcon = cfg.icon; });
    allResults = allResults.concat(fixtures.slice(0,cfg.maxFixtures));
  }
  if (!allResults.length) return [];
  apiStatus.oddsPapiEsports = 'ok';

  var out = [];
  for (var i=0; i<allResults.length; i++) {
    var fx = allResults[i];
    var oddsUrl = 'https://api.oddspapi.io/v4/odds?fixtureId='+fx.fixtureId+'&apiKey=' + KEYS.oddsPapi;
    var data = await proxyFetch(oddsUrl, 'OddsPapi Esports odds');
    if (!data || !data.bookmakerOdds) continue;

    var b365 = {}, pin = {};
    Object.keys(data.bookmakerOdds).forEach(function(slug) {
      var bk = data.bookmakerOdds[slug];
      var markets = bk.markets || {};
      var mw = markets['171']; // Match Winner
      if (!mw || !mw.outcomes) return;
      var p1 = mw.outcomes['171'] && mw.outcomes['171'].players && mw.outcomes['171'].players['0'];
      var p2 = mw.outcomes['172'] && mw.outcomes['172'].players && mw.outcomes['172'].players['0'];
      if (!p1 || !p2) return;
      var tgt = slug==='pinnacle' ? pin : slug==='bet365' ? b365 : null;
      if (!tgt) return; // solo nos interesan Pinnacle (referencia) y Bet365 (tu casa real)
      tgt['h2h_'+(fx.participant1Name||'Team1')] = parseFloat(p1.price||0);
      tgt['h2h_'+(fx.participant2Name||'Team2')] = parseFloat(p2.price||0);
    });

    if (Object.keys(b365).length || Object.keys(pin).length) {
      out.push({id:'esport_'+fx.fixtureId, sport:fx._sportIcon, match:(fx.participant1Name||'')+' vs '+(fx.participant2Name||''), comp:fx.tournamentName||'', ko:fx.startTime, b365:b365, winamax:{}, pin:pin, src:'OddsPapiEsports'});
    }
  }
  return out;
}

async function fetchOddsPapi() {
  // Correct domain: api.oddspapi.io (not .com). sportId=10 is football/soccer.
  // Step 1: get fixtures for soccer
  var fixturesUrl = 'https://api.oddspapi.io/v4/fixtures?sportId=10&apiKey=' + KEYS.oddsPapi;
  var fixtures = await proxyFetch(fixturesUrl, 'OddsPapi (fixtures)');
  if (!fixtures || !Array.isArray(fixtures) || !fixtures.length) return [];
  apiStatus.oddsPapi = 'ok';

  var tournamentIds = [...new Set(fixtures.slice(0,10).map(function(f){return f.tournamentId;}).filter(Boolean))].slice(0,3);
  if (!tournamentIds.length) return [];

  // Step 2: get Pinnacle odds for those tournaments
  var oddsUrl = 'https://api.oddspapi.io/v4/odds-by-tournaments?bookmaker=pinnacle&tournamentIds='
    + tournamentIds.join(',') + '&apiKey=' + KEYS.oddsPapi;
  var oddsData = await proxyFetch(oddsUrl, 'OddsPapi (odds)');
  if (!oddsData || !Array.isArray(oddsData)) return [];

  return oddsData.slice(0,15).map(function(fx) {
    var pin = {};
    var pinData = fx.bookmakerOdds && fx.bookmakerOdds.pinnacle;
    if (pinData && pinData.markets) {
      // Market 101 is typically 1X2 in OddsPapi's schema; extract home/draw/away prices
      var mkt1x2 = pinData.markets['101'];
      if (mkt1x2 && mkt1x2.outcomes) {
        var o = mkt1x2.outcomes;
        if (o['101'] && o['101'].players && o['101'].players['0']) pin['h2h_home'] = parseFloat(o['101'].players['0'].price||0);
        if (o['102'] && o['102'].players && o['102'].players['0']) pin['h2h_draw'] = parseFloat(o['102'].players['0'].price||0);
        if (o['103'] && o['103'].players && o['103'].players['0']) pin['h2h_away'] = parseFloat(o['103'].players['0'].price||0);
      }
    }
    return {id:fx.fixtureId, match:'fixture_'+fx.fixtureId, ko:fx.startTime, pin:pin};
  }).filter(function(e){return Object.keys(e.pin).length>0;});
}

function shouldFetch(api) { return Date.now()-lastFetch[api] >= INTERVALS[api]; }

async function runFetch() {
  if (FETCH_RUNNING) { addDiag('Ya hay un escaneo en curso...'); return; }
  FETCH_RUNNING = true;
  LOADING = true;
  setPulse('loading');
  renderPage();

  try {
    var apis = ['theOdds','oddsApi','sgo','oddsPapi','sharpApi','oddsPapiEsports'].filter(shouldFetch);
    if (!apis.length) {
      addDiag('Nada que actualizar todavГ­a (esperando intervalos)');
      LOADING=false; FETCH_RUNNING=false; setPulse('live'); renderPage(); return;
    }
    addDiag('Escaneando: '+apis.join(', '));

    var results = {};
    var jobs = [];
    if (apis.includes('theOdds'))  jobs.push(fetchTheOdds().then(function(r){results.theOdds=r||[]; lastFetch.theOdds=Date.now(); REQ.theOdds=(REQ.theOdds||0)+1;}).catch(function(e){addDiag('вњ— theOdds: '+e.message.substring(0,40)); apiStatus.theOdds='error';}));
    if (apis.includes('oddsApi'))  jobs.push(fetchOddsApiIo().then(function(r){results.oddsApi=r||[]; lastFetch.oddsApi=Date.now(); REQ.oddsApi=(REQ.oddsApi||0)+1;}).catch(function(e){addDiag('вњ— oddsApi: '+e.message.substring(0,40)); apiStatus.oddsApi='error';}));
    if (apis.includes('sgo'))      jobs.push(fetchSGO().then(function(r){results.sgo=r||[]; lastFetch.sgo=Date.now(); REQ.sgo=(REQ.sgo||0)+1;}).catch(function(e){addDiag('вњ— sgo: '+e.message.substring(0,40)); apiStatus.sgo='error';}));
    if (apis.includes('sharpApi'))  jobs.push(fetchSharpApi().then(function(r){results.sharpApi=r||[]; lastFetch.sharpApi=Date.now(); REQ.sharpApi=(REQ.sharpApi||0)+1;}).catch(function(e){addDiag('вњ— sharpApi: '+e.message.substring(0,40)); apiStatus.sharpApi='error';}));
    if (apis.includes('oddsPapi')) jobs.push(fetchOddsPapi().then(function(r){results.oddsPapi=r||[]; lastFetch.oddsPapi=Date.now(); REQ.oddsPapi=(REQ.oddsPapi||0)+1;}).catch(function(e){addDiag('вњ— oddsPapi: '+e.message.substring(0,40)); apiStatus.oddsPapi='error';}));
    if (apis.includes('oddsPapiEsports')) jobs.push(fetchOddsPapiEsports().then(function(r){results.oddsPapiEsports=r||[]; lastFetch.oddsPapiEsports=Date.now(); REQ.oddsPapiEsports=(REQ.oddsPapiEsports||0)+1;}).catch(function(e){addDiag('вњ— esports: '+e.message.substring(0,40)); apiStatus.oddsPapiEsports='error';}));

    await Promise.allSettled(jobs);
    saveReq();

    processDirectResults(results);
    LAST_UP = Date.now();
    REQ.lastScan = LAST_UP;
    REQ.scanCount = (REQ.scanCount||0)+1;
    saveReq();
    addDiag('вњ“ Escaneo completo В· '+MONITOR.length+' eventos В· '+ALERTS.length+' alertas');
    setPulse('live');

  } catch(e) {
    addDiag('вњ— Error general: '+e.message.substring(0,60));
    ERRORS.push({src:'runFetch', msg:e.message, t:Date.now()});
    setPulse('error');
  }

  LOADING = false;
  FETCH_RUNNING = false;
  renderPage();
  updateBadge();
}

function processDirectResults(results) {
  var newAlerts=[], newSharp=[], newValue=[], newMon=[], newArb=[];
  var totalRaw = 0;

  ['theOdds','oddsApi','sgo','sharpApi','oddsPapiEsports'].forEach(function(src) {
    totalRaw += (results[src]||[]).length;
    (results[src]||[]).forEach(function(ev) {
      if (!ev || !ev.id) return;
      var pinMatch = (results.oddsPapi||[]).find(function(p){return p.id===ev.id;});
      var pin = (ev.pin && Object.keys(ev.pin).length) ? ev.pin : (pinMatch ? pinMatch.pin : {});
      var b365 = ev.b365 || {};
      var winamax = ev.winamax || {};
      var points = ev.points || {};
      var hasAny = Object.keys(b365).length>0 || Object.keys(winamax).length>0 || Object.keys(pin).length>0;

      if (hasAny) {
        newMon.push({sport:ev.sport||'вљЅ', match:ev.match, comp:ev.comp||'', ko:ev.ko||'', b365:b365, winamax:winamax, pin:pin, src:ev.src});
        if (Object.keys(b365).length>0 || Object.keys(winamax).length>0) {
          detectEV(ev.id, ev.sport||'вљЅ', ev.match, ev.ko||'', b365, winamax, pin, newValue, newAlerts);
          detectSharp(ev.id, ev.sport||'вљЅ', ev.match, ev.ko||'', b365, winamax, newSharp, newAlerts);
          detectSuspension(ev.id, ev.sport||'вљЅ', ev.match, ev.ko||'', b365, winamax, newAlerts);
          detectArbitrage(ev.id, ev.sport||'вљЅ', ev.match, ev.ko||'', b365, winamax, newArb, newAlerts);
          detectMiddles(ev.id, ev.sport||'вљЅ', ev.match, ev.ko||'', b365, winamax, points, newArb, newAlerts);
          HISTORY[ev.id] = {b365: Object.assign({}, b365), winamax: Object.assign({}, winamax), t: Date.now()};
        }
      }
    });
  });

  addDiag('Procesado: '+totalRaw+' eventos crudos в†’ '+newMon.length+' con cuotas'+(newArb.length?' В· '+newArb.length+' arbitrajes':''));

  newAlerts.forEach(function(a) { if(!ALERTS.find(function(x){return x.key===a.key;})) ALERTS.unshift(a); });
  var priorityRank = {highvolume:-1, extreme:0, high:1, normal:2, undefined:2};
  ALERTS.sort(function(a,b){
    var pa = priorityRank[a.priority]!==undefined ? priorityRank[a.priority] : 2;
    var pb = priorityRank[b.priority]!==undefined ? priorityRank[b.priority] : 2;
    if (pa !== pb) return pa - pb;
    return (b.t||0) - (a.t||0);
  });
  ALERTS=ALERTS.slice(0,50);
  newSharp.forEach(function(s) { if(!SHARP.find(function(x){return x.key===s.key;})) SHARP.unshift(s); });
  SHARP=SHARP.slice(0,30);
  VALUEB=newValue.sort(function(a,b){return b.evNum-a.evNum;}).slice(0,20);
  ARB=newArb.sort(function(a,b){return b.profitPct-a.profitPct;}).slice(0,15);
  MONITOR=newMon.slice(0,30);
}

// в”Ђв”Ђ DETECTORS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Compara TUS dos casas (Bet365 y Winamax) contra Pinnacle (referencia sharp).
// Para cada mercado, usa la MEJOR cuota entre tus dos casas.
function buildMarketLabel(mktKey, sport) {
  // mktKey examples: "h2h_Taylor Fritz", "totals_Over", "totals_Under", "h2h_Draw"
  var parts = mktKey.split('_');
  var marketType = parts[0]; // h2h | totals | spreads
  var outcome = parts.slice(1).join('_').trim();

  if (marketType === 'h2h') {
    if (outcome.toLowerCase() === 'draw' || outcome.toLowerCase() === 'empate') return 'Empate';
    return 'Victoria de ' + outcome;
  }
  if (marketType === 'totals') {
    if (outcome.toLowerCase().includes('over')) return 'MГЎs de goles/puntos (Over)';
    if (outcome.toLowerCase().includes('under')) return 'Menos de goles/puntos (Under)';
    return 'Total: ' + outcome;
  }
  if (marketType === 'spreads') return 'HГЎndicap: ' + outcome;
  return outcome || mktKey;
}

// в”Ђв”Ђ ARBITRAJE: beneficio garantizado entre Bet365 y Winamax в”Ђв”Ђ
// A diferencia del EV+, esto NO depende de estimar la probabilidad real con
// Pinnacle. Si la suma de probabilidades implГ­citas de dos resultados
// excluyentes en TUS dos casas es <100%, puedes apostar a ambos lados y
// ganar dinero seguro sin importar el resultado. Es la categorГ­a que toda
// herramienta profesional (OddsJam, RebelBetting) ofrece y que nos faltaba.
function detectArbitrage(id,sport,match,ko,b365,winamax,outArb,outA) {
  if (!b365 || !winamax) return;
  // Agrupar por tipo de mercado (h2h, totals, spreads) para comparar resultados opuestos
  var groups = {};
  Object.keys(b365).concat(Object.keys(winamax)).forEach(function(mkt) {
    var marketType = mkt.split('_')[0];
    if (!groups[marketType]) groups[marketType] = new Set();
    groups[marketType].add(mkt);
  });

  Object.keys(groups).forEach(function(marketType) {
    var outcomes = Array.from(groups[marketType]);
    if (outcomes.length < 2) return; // necesita al menos 2 resultados excluyentes

    // Para cada resultado, usar la MEJOR cuota disponible entre tus 2 casas
    var bestPerOutcome = outcomes.map(function(mkt) {
      var bVal = parseFloat((b365||{})[mkt]) || 0;
      var wVal = parseFloat((winamax||{})[mkt]) || 0;
      if (wVal > bVal) return {mkt:mkt, odds:wVal, book:'Winamax'};
      return {mkt:mkt, odds:bVal, book:'Bet365'};
    }).filter(function(o){ return o.odds > 1.01; });

    if (bestPerOutcome.length < 2) return;

    // Solo evaluar combinaciones de exactamente 2 resultados opuestos (h2h: ganador A vs B; totals: over vs under)
    // Para h2h con 3 resultados (incluye empate) evaluamos pares, no la tripleta completa (mГЎs simple y mГЎs fiable con datos limitados)
    for (var i=0; i<bestPerOutcome.length; i++) {
      for (var j=i+1; j<bestPerOutcome.length; j++) {
        var a = bestPerOutcome[i], b = bestPerOutcome[j];
        if (a.book===b.book) continue; // arbitraje real requiere usar TUS DOS casas, no la misma
        var impliedSum = (1/a.odds) + (1/b.odds);
        if (impliedSum >= 1) continue; // no hay arbitraje, suma debe ser <100%
        var profitPct = (1/impliedSum - 1) * 100;
        if (profitPct < 0.5) continue; // ignorar mГЎrgenes insignificantes (probable error de datos)

        var nameA = buildMarketLabel(a.mkt, sport);
        var nameB = buildMarketLabel(b.mkt, sport);
        var key = id+'_arb_'+a.mkt+'_'+b.mkt;

        outArb.push({key:key, sport:sport, match:match, ko:ko,
          outcomeA:nameA, bookA:a.book, oddsA:a.odds,
          outcomeB:nameB, bookB:b.book, oddsB:b.odds,
          profitPct:profitPct});

        if (profitPct >= 1) outA.push({key:'arb_'+key, type:'arb', sport:sport, match:match, ko:ko, priority: profitPct>=3?'extreme':'high',
          signal:'рџЋЇ ARBITRAJE '+profitPct.toFixed(1)+'% GARANTIZADO',
          detail:'Apostando a "'+nameA+'" en '+a.book+' ('+a.odds.toFixed(2)+') Y a "'+nameB+'" en '+b.book+' ('+b.odds.toFixed(2)+') al mismo tiempo, ganas dinero seguro sin importar el resultado del evento. Esto no es una predicciГіn вЂ” es matemГЎtica garantizada mientras ambas cuotas se mantengan.',
          arbDetails:{outcomeA:nameA, bookA:a.book, oddsA:a.odds, outcomeB:nameB, bookB:b.book, oddsB:b.odds, profitPct:profitPct},
          t:Date.now()});
      }
    }
  });
}

// в”Ђв”Ђ MIDDLES: cuando hay un "hueco" entre las lГ­neas de Bet365 y Winamax в”Ђв”Ђ
// Ejemplo: Bet365 ofrece "Over 2.5" y Winamax ofrece "Under 3.5" en el mismo
// partido. Si el resultado final es exactamente 3 goles, GANAS LAS DOS apuestas
// (no solo no pierdes вЂ” ganas el doble). Si cae fuera de ese rango, pierdes solo
// una de las dos como en una apuesta normal. Requiere el valor de lГ­nea (point),
// que solo The Odds API nos da de momento.
function detectMiddles(id,sport,match,ko,b365,winamax,points,outArb,outA) {
  // NOTA DE DISEГ‘O: los middles solo se envГ­an a outA (Alertas), NUNCA a outArb
  // (pestaГ±a Arbitraje), a propГіsito. Mezclar "riesgo limitado" con "beneficio
  // garantizado" en la misma lista serГ­a confuso y potencialmente peligroso.
  if (!points || !Object.keys(points).length) return;
  // Agrupar puntos por tipo de mercado (totals_Over, totals_Under, etc.)
  var totalsKeys = Object.keys(points).filter(function(k){ return k.indexOf('totals_')===0; });
  var overKeys = totalsKeys.filter(function(k){ return k.toLowerCase().includes('over'); });
  var underKeys = totalsKeys.filter(function(k){ return k.toLowerCase().includes('under'); });

  overKeys.forEach(function(overK) {
    underKeys.forEach(function(underK) {
      var overInfo = points[overK], underInfo = points[underK];
      if (!overInfo || !underInfo) return;
      if (overInfo.book === underInfo.book) return; // necesita ser de casas distintas (la misma casa no genera middle, son sus 2 caras del mismo mercado)

      var overPoint = overInfo.point, underPoint = underInfo.point;
      // Middle real: la lГ­nea de "Under" debe ser MAYOR que la de "Over" para crear un hueco
      var gap = underPoint - overPoint;
      if (gap <= 0) return; // no hay hueco, son lГ­neas normales sin oportunidad

      var overOdds = overInfo.book==='Bet365' ? parseFloat(b365[overK]||0) : parseFloat(winamax[overK]||0);
      var underOdds = underInfo.book==='Bet365' ? parseFloat(b365[underK]||0) : parseFloat(winamax[underK]||0);
      if (overOdds<=1.01 || underOdds<=1.01) return;

      var key = id+'_middle_'+overK+'_'+underK;
      var winningNumbers = gap - 1; // ej: gap de 1.0 (2.5 a 3.5) = 1 resultado exacto (3) gana ambas
      if (winningNumbers < 0.5) return; // hueco demasiado pequeГ±o para ser relevante

      outA.push({key:'mid_'+key, type:'arb', sport:sport, match:match, ko:ko, priority:'high',
        signal:'рџЋЇ MIDDLE вЂ” hueco de '+gap.toFixed(1)+' entre lГ­neas',
        detail:'Apostando "MГЎs de '+overPoint+'" en '+overInfo.book+' ('+overOdds.toFixed(2)+') Y "Menos de '+underPoint+'" en '+underInfo.book+' ('+underOdds.toFixed(2)+'), si el resultado cae justo en el medio ganas AMBAS apuestas. Si cae fuera, pierdes solo una como en una apuesta normal вЂ” el riesgo es limitado y la recompensa puede ser doble.',
        arbDetails:{outcomeA:'MГЎs de '+overPoint, bookA:overInfo.book, oddsA:overOdds, outcomeB:'Menos de '+underPoint, bookB:underInfo.book, oddsB:underOdds, profitPct:0, isMiddle:true},
        t:Date.now()});
    });
  });
}

// Quita el margen (vig) de un mercado de 2 o 3 resultados, devolviendo la
// probabilidad "justa" de cada lado. Esto es lo que hace cualquier apostador
// profesional serio antes de comparar cuotas вЂ” comparar cuotas crudas sin
// quitar el vig de la casa de referencia (aunque sea Pinnacle, que tiene vig
// bajo pero no cero) puede dar seГ±ales de valor falsas o infladas.
function noVigProb(pinMarketOdds) {
  // pinMarketOdds: objeto con las cuotas de Pinnacle para TODOS los resultados
  // de un mismo mercado (ej. {h2h_home:2.1, h2h_draw:3.4, h2h_away:3.2})
  var keys = Object.keys(pinMarketOdds);
  var impliedSum = 0;
  var implied = {};
  keys.forEach(function(k) {
    var o = parseFloat(pinMarketOdds[k]);
    if (!o || o<=1.01) return;
    implied[k] = 1/o;
    impliedSum += implied[k];
  });
  if (impliedSum <= 0) return null;
  var fair = {};
  keys.forEach(function(k) { if (implied[k]!==undefined) fair[k] = implied[k]/impliedSum; });
  return fair; // probabilidad justa de cada resultado, vig ya descontado
}

function detectEV(id,sport,match,ko,b365,winamax,pin,outV,outA) {
  if (!pin || !Object.keys(pin).length) return;
  // Agrupamos las claves de Pinnacle por "familia" de mercado (todo lo que
  // empiece igual hasta el Гєltimo _) para poder calcular el no-vig junto.
  // Para mercados simples de 1 sola lГ­nea (sin pareja), usamos la cuota cruda
  // como fallback, igual que antes вЂ” mejor tener una seГ±al aproximada que ninguna.
  var pinFair = noVigProb(pin) || pin;
  var allMarkets = new Set(Object.keys(b365||{}).concat(Object.keys(winamax||{})));
  allMarkets.forEach(function(mkt) {
    var p = parseFloat(pin[mkt]);
    if (!p || p<=1.01) return;
    var name = buildMarketLabel(mkt, sport);

    var bVal = parseFloat((b365||{})[mkt]) || 0;
    var wVal = parseFloat((winamax||{})[mkt]) || 0;
    if (bVal<=1.01 && wVal<=1.01) return;

    // Probabilidad justa de Pinnacle para este resultado concreto (vig fuera).
    // Si no pudimos calcular el no-vig (ej. solo 1 resultado disponible),
    // usamos 1/cuota cruda como aproximaciГіn, igual que el mГ©todo anterior.
    var pFairProb = (pinFair[mkt]!==undefined) ? pinFair[mkt] : (1/p);
    var pFairOdds = 1/pFairProb; // cuota "justa" equivalente, para mostrar igual que antes

    var bEv = bVal>1.01 ? ((bVal*pFairProb)-1)*100 : null;
    var wEv = wVal>1.01 ? ((wVal*pFairProb)-1)*100 : null;

    // Mostrar SIEMPRE ambas casas juntas si al menos una tiene EV+ >=5%, para poder comparar
    var qualifies = (bEv!==null && bEv>=5) || (wEv!==null && wEv>=5);
    if (!qualifies) return;

    var bestEv = Math.max(bEv||-999, wEv||-999);
    var key=id+'_'+mkt;
    outV.push({key:key,sport:sport,match:match,ko:ko,market:name,
      b365odds: bVal||null, b365ev: bEv,
      winamaxOdds: wVal||null, winamaxEv: wEv,
      pinnacle:p, ev:bestEv.toFixed(1), evNum:bestEv});

    // Registro automГЎtico para CLV: cada pick que cumple el umbral se guarda con su
    // cuota de apertura, sin que el usuario tenga que marcar nada manualmente.
    if (bEv!==null && bEv>=5) logPick(key+'_Bet365', {sport:sport, match:match, market:name, book:'Bet365', odds:bVal, pinnacle:p, ev:bEv.toFixed(1), ko:ko});
    if (wEv!==null && wEv>=5) logPick(key+'_Winamax', {sport:sport, match:match, market:name, book:'Winamax', odds:wVal, pinnacle:p, ev:wEv.toFixed(1), ko:ko});

    if (bestEv>6) {
      var bestBook = (wEv||-999) > (bEv||-999) ? 'Winamax' : 'Bet365';
      var bestOdds = bestBook==='Winamax' ? wVal : bVal;
      outA.push({key:'ev_'+key,type:'value',sport:sport,match:match,ko:ko,
        signal:'EV+'+bestEv.toFixed(1)+'% вЂ” '+name+' ('+bestBook+')',
        detail:'Apuesta: "'+name+'". '+bestBook+' paga '+bestOdds.toFixed(2)+' cuando Pinnacle lo tiene a '+p.toFixed(2)+'. La casa estГЎ equivocada. Ventana de valor abierta вЂ” actГєa antes de que corrija.',
        from:p.toFixed(2),to:bestOdds.toFixed(2),bestBook:bestBook,market:name,ev:bestEv.toFixed(1),t:Date.now()});
    }
  });
}

// Sharp money: detecta movimiento en CUALQUIERA de tus dos casas
function detectSharp(id,sport,match,ko,b365,winamax,outS,outA) {
  var prev=HISTORY[id]; if (!prev) return;
  var minsSincePrev = prev.t ? (Date.now()-prev.t)/60000 : null;
  var movesThisEvent = {}; // mkt -> {Bet365: chg, Winamax: chg} para detectar coordinaciГіn

  [{curr:b365, prevB:prev.b365, book:'Bet365'}, {curr:winamax, prevB:prev.winamax, book:'Winamax'}].forEach(function(pair) {
    if (!pair.curr || !pair.prevB) return;
    Object.keys(pair.curr).forEach(function(mkt) {
      var c=parseFloat(pair.curr[mkt]); var o=parseFloat(pair.prevB[mkt]);
      if (!c||!o||c<=1.01||o<=1.01) return;
      var chg=((o-c)/o)*100; if (Math.abs(chg)<5) return;
      var dir=chg>0?'BAJADA':'SUBIDA';
      var name=mkt.replace(/_/g,' ').replace(/^h2h /,'').trim();
      var key=id+'_'+mkt+'_'+dir+'_'+pair.book;
      var absChg = Math.abs(chg);
      // Velocidad: % de cambio por minuto. Un mismo % en 3 min es mucho mГЎs
      // raro estadГ­sticamente que en 90 min вЂ” es la seГ±al mГЎs cercana a
      // "una sola apuesta enorme de golpe" que se puede inferir pГєblicamente.
      var ratePerMin = (minsSincePrev && minsSincePrev>0) ? absChg/minsSincePrev : null;
      var isFast = ratePerMin!==null && ratePerMin>=3 && minsSincePrev<=15;
      // Magnitud del movimiento = proxy de tamaГ±o de la apuesta que lo causГі.
      var priority = absChg>=20 ? 'extreme' : absChg>=10 ? 'high' : 'normal';
      // Perfil de alto volumen: magnitud alta Y rГЎpida. Es inferencia estadГ­stica,
      // NUNCA identificaciГіn de quiГ©n apostГі вЂ” eso no es posible con datos pГєblicos.
      var highVolumeProfile = (priority==='extreme' || priority==='high') && isFast;
      if (highVolumeProfile) priority = 'highvolume';

      if (!movesThisEvent[mkt]) movesThisEvent[mkt] = {};
      movesThisEvent[mkt][pair.book] = {chg:chg, dir:dir, from:o, to:c, name:name, isFast:isFast};

      outS.push({key:key,sport:sport,match:match,ko:ko,market:name,book:pair.book,from:o.toFixed(2),to:c.toFixed(2),chg:absChg.toFixed(1),dir:dir,priority:priority,t:Date.now()});
      if (absChg>4) {
        var sig = highVolumeProfile ? 'рџЏ† PERFIL ALTO VOLUMEN вЂ” ' : (priority==='extreme'?'рџљЁ MOVIMIENTO MASIVO вЂ” ':'');
        var det = highVolumeProfile
          ? 'Movimiento de '+absChg.toFixed(1)+'% en solo '+minsSincePrev.toFixed(0)+' min en '+pair.book+'. Esta combinaciГіn de magnitud y velocidad es estadГ­sticamente rara en apuestas normales acumuladas вЂ” el patrГіn es compatible con una operaciГіn de alto volumen. Importante: esto es una inferencia estadГ­stica sobre el PATRГ“N del movimiento, no una identificaciГіn de quiГ©n apostГі; esa informaciГіn no es pГєblica en ningГєn sitio. '
          : (priority==='extreme'?'Movimiento de esta magnitud en una sola actualizaciГіn es propio de apuestas muy grandes (cinco-seis cifras), del tipo que mueven los sindicatos profesionales. ':'');
        outA.push({key:'sh_'+key,type:'sharp',sport:sport,match:match,ko:ko,market:name,priority:priority,
          signal:sig+dir+' '+absChg.toFixed(1)+'% en '+pair.book+' вЂ” '+name,
          detail:det+'Cuota de '+pair.book+' movida de '+o.toFixed(2)+' a '+c.toFixed(2)+'. Sin noticia pГєblica que lo justifique = dinero entrando con fuerza. ActГєa antes de que baje mГЎs.',
          from:o.toFixed(2),to:c.toFixed(2),book:pair.book,chg:absChg.toFixed(1),dir:dir,t:Date.now()});
      }
    });
  });

  // в”Ђв”Ђ SEГ‘AL COORDINADA: ambas casas se mueven en la misma direcciГіn в”Ђв”Ђ
  // Esto es mГЎs fiable que un movimiento aislado вЂ” indica que el mercado
  // global estГЎ corrigiendo, no solo una casa concreta. Si ademГЎs es rГЎpida
  // y de magnitud extrema, es la inferencia mГЎs fuerte posible con datos pГєblicos.
  Object.keys(movesThisEvent).forEach(function(mkt) {
    var m = movesThisEvent[mkt];
    if (m.Bet365 && m.Winamax && m.Bet365.dir === m.Winamax.dir) {
      var avgChg = (Math.abs(m.Bet365.chg) + Math.abs(m.Winamax.chg)) / 2;
      var dir = m.Bet365.dir;
      var name = m.Bet365.name;
      var bothFast = m.Bet365.isFast && m.Winamax.isFast;
      var coordPriority = avgChg>=15 ? 'extreme' : avgChg>=8 ? 'high' : 'normal';
      if (bothFast && (coordPriority==='extreme'||coordPriority==='high')) coordPriority = 'highvolume';
      var sig = coordPriority==='highvolume' ? 'рџЏ†рџ”Ґ PERFIL ALTO VOLUMEN COORDINADO вЂ” ' : (coordPriority==='extreme'?'рџљЁрџ”Ґ INVERSIГ“N MASIVA COORDINADA вЂ” ':'рџ”Ґ SEГ‘AL COORDINADA вЂ” ');
      var det = coordPriority==='highvolume'
        ? 'Ambas casas se mueven a la vez Y muy rГЎpido ('+minsSincePrev.toFixed(0)+' min). Es el patrГіn pГєblico mГЎs cercano a una operaciГіn de alto volumen coordinada en varios libros вЂ” pero sigue siendo inferencia estadГ­stica sobre el patrГіn, no identificaciГіn de quiГ©n estГЎ detrГЎs. '
        : (coordPriority==='extreme'?'Esto es lo mГЎs cercano a confirmar que hay dinero grande moviendo el mercado ahora mismo: ':'');
      outA.push({key:'coord_'+id+'_'+mkt+'_'+dir, type:'sharp', sport:sport, match:match, ko:ko, market:name, priority:coordPriority,
        signal:sig+dir+' en Bet365 Y Winamax вЂ” '+name,
        detail:det+'Ambas casas se mueven en la misma direcciГіn a la vez: Bet365 '+Math.abs(m.Bet365.chg).toFixed(1)+'%, Winamax '+Math.abs(m.Winamax.chg).toFixed(1)+'%. Esto indica que el mercado en general estГЎ corrigiendo, no solo una casa вЂ” seГ±al mucho mГЎs fiable que un movimiento aislado.',
        from:m.Bet365.from.toFixed(2), to:m.Bet365.to.toFixed(2), chg:avgChg.toFixed(1), dir:dir, coordinated:true, t:Date.now()});
    }
  });
}

// в”Ђв”Ђ DETECCIГ“N DE SUSPENSIГ“N DE MERCADO в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Cuando un mercado que existГ­a en el escaneo anterior desaparece del
// actual, suele indicar que la casa lo ha suspendido temporalmente para
// recalcular tras una apuesta grande вЂ” seГ±al fuerte segГєn mГ©todo Walters.
function detectSuspension(id,sport,match,ko,b365,winamax,outA) {
  var prev=HISTORY[id]; if (!prev) return;
  [{curr:b365, prevB:prev.b365, book:'Bet365'}, {curr:winamax, prevB:prev.winamax, book:'Winamax'}].forEach(function(pair) {
    if (!pair.prevB) return;
    // Evitar falso positivo: si esta casa no devolviГі NINGГљN mercado en este escaneo,
    // probablemente es un fallo de red nuestro, no una suspensiГіn real de la casa.
    var bookRespondedThisScan = pair.curr && Object.keys(pair.curr).length > 0;

      var hasNow = parseFloat(pair.curr[mkt]) > 1.01;

          from:parseFloat(pair.prevB[mkt]).toFixed(2), to:'suspendido', book:pair.book, suspended:true, t:Date.now()});
      }
    });
  });
}

// Calcula cГіmo repartir tu banca entre las dos apuestas de arbitraje para que
// el beneficio sea EXACTAMENTE el mismo sin importar quГ© resultado ocurra.
function calcArbStakes(oddsA, oddsB, totalStake) {
  // Stake en A proporcional a 1/oddsA respecto a la suma de probabilidades implГ­citas
  var impliedA = 1/oddsA, impliedB = 1/oddsB;
  var sum = impliedA + impliedB;
  var stakeA = totalStake * (impliedA/sum);
  var stakeB = totalStake * (impliedB/sum);
  var profitIfA = stakeA*oddsA - totalStake;
  var profitIfB = stakeB*oddsB - totalStake;
  return {stakeA:stakeA, stakeB:stakeB, profit:(profitIfA+profitIfB)/2};
}

// в”Ђв”Ђ CONTROLS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function forceRefresh() {
  addDiag('Manual refresh triggered');
  FETCH_RUNNING = false;
  LOADING = false;
  Object.keys(lastFetch).forEach(function(k){lastFetch[k]=0;});
  setPulse('loading');
  renderPage();
  setTimeout(runFetch, 100);
}
function resetCounters() {
  if (confirm('ВїResetear contadores? Solo al inicio del mes.')) {
    Object.keys(REQ).forEach(function(k){REQ[k]=0;}); saveReq(); renderPage();
  }
}

// в”Ђв”Ђ PULSE + TIMER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function setPulse(state) {
  var dot=document.getElementById('pdot'); var txt=document.getElementById('ptxt');
  if(!dot||!txt) return;
  dot.className='pdot '+state;
  if(state==='live') txt.textContent='En vivo В· '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  else if(state==='loading') txt.textContent='Actualizando...';
  else {
    var le=ERRORS.length?ERRORS[ERRORS.length-1]:null;
    txt.textContent=le&&le.code?'Error HTTP '+le.code:le&&le.msg?'Error: '+le.msg.substring(0,20):'Error de conexiГіn';
  }
}
function updateBadge() {
  var el=document.getElementById('ab'); if(el) el.textContent=ALERTS.length;
  // Badge API: pone un nГєmero en el icono de la app en pantalla de inicio (solo PWA instalada)
  if ('setAppBadge' in navigator) {
    try {
      if (ALERTS.length > 0) navigator.setAppBadge(ALERTS.length).catch(function(){});
      else navigator.clearAppBadge().catch(function(){});
    } catch(e) {}
  }
}

var T_START=Date.now(); var T_INT=50000;
setInterval(function() {
  var el=Date.now()-T_START;
  var fill=document.getElementById('tfill');
  if(fill) fill.style.width=Math.max(0,100-(el/T_INT)*100)+'%';
  var txt=document.getElementById('ptxt');
  if(txt&&LAST_UP&&document.getElementById('pdot').classList.contains('live'))
    txt.textContent='En vivo В· '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(el>=T_INT){ T_START=Date.now(); runFetch(); }
}, 1000);

// в”Ђв”Ђ INIT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function guardarClavesPropias() {
  var statusEl = document.getElementById('keysStatus');
  var newKeys = {
    theOdds:  document.getElementById('cfgTheOdds').value.trim(),
    oddsApi:  document.getElementById('cfgOddsApi').value.trim(),
    oddsPapi: document.getElementById('cfgOddsPapi').value.trim(),
    sgo:      document.getElementById('cfgSgo').value.trim(),
    sharpApi: document.getElementById('cfgSharpApi').value.trim(), // opcional, puede quedar vacГ­o
  };
  var newWorkerUrl = document.getElementById('cfgWorker').value.trim();

  if (!newWorkerUrl || !newKeys.theOdds || !newKeys.oddsApi || !newKeys.oddsPapi || !newKeys.sgo) {
    if (statusEl) { statusEl.innerHTML = 'вљ пёЏ Los 4 campos principales son obligatorios (SharpAPI es opcional).'; statusEl.style.color = 'var(--warn)'; }
    return;
  }

  saveKeys(newKeys);
  saveWorkerUrl(newWorkerUrl);
  if (statusEl) { statusEl.innerHTML = 'вњ… Guardado. Recargando para aplicar tus claves...'; statusEl.style.color = 'var(--value)'; }
  setTimeout(function(){ location.reload(); }, 1200);
}

async function activarNotificaciones() {
  var statusEl = document.getElementById('notifStatus');
  if (!statusEl) return;

  // ComprobaciГіn 1: ВїestГЎ la app instalada en pantalla de inicio? (requisito de Apple)
  var isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  if (!isStandalone) {
    statusEl.innerHTML = 'вљ пёЏ Primero aГ±ade esta app a tu pantalla de inicio (Compartir в†’ AГ±adir a pantalla de inicio) y ГЎbrela desde ahГ­. iOS lo exige antes de poder activar notificaciones.';
    statusEl.style.color = 'var(--warn)';
    return;
  }

  if (typeof OneSignal === 'undefined') {
    statusEl.innerHTML = 'вќЊ El script de OneSignal no ha cargado. Revisa tu conexiГіn a internet y vuelve a intentarlo. Si persiste tras varios intentos, puede ser un bloqueo de red.';
    statusEl.style.color = 'var(--sharp)';
    return;
  }

  if (!window._oneSignalReady) {
    // Damos una segunda oportunidad esperando hasta 8s antes de reportar fallo real
    statusEl.innerHTML = 'вЏі Inicializando, espera 8 segundos...';
    statusEl.style.color = 'var(--muted)';
    var waited = 0;
    while (!window._oneSignalReady && waited < 8000) {
      await new Promise(function(r){ setTimeout(r, 500); });
      waited += 500;
    }
    if (!window._oneSignalReady) {
      statusEl.innerHTML = 'вќЊ El sistema de notificaciones no terminГі de inicializar tras 8s. Esto suele indicar un problema con el Service Worker (archivo OneSignalSDKWorker.js) o con la cuenta de OneSignal. Vuelve a intentarlo o avГ­same con este mensaje.';
      statusEl.style.color = 'var(--sharp)';
      return;
    }
  }

  try {
    await OneSignal.User.PushSubscription.optIn();
    var isSubscribed = OneSignal.User.PushSubscription.optedIn;
    if (isSubscribed) {
      statusEl.innerHTML = 'вњ… Notificaciones activadas. RecibirГЎs avisos de movimientos masivos y arbitrajes.';
      statusEl.style.color = 'var(--value)';
    } else {
      statusEl.innerHTML = 'вќЊ Permiso denegado. Ve a Ajustes del iPhone в†’ Smart Money в†’ Notificaciones para activarlo manualmente.';
      statusEl.style.color = 'var(--sharp)';
    }
  } catch(e) {
    statusEl.innerHTML = 'вќЊ Error: '+e.message.substring(0,80);
    statusEl.style.color = 'var(--sharp)';
  }
}

function init() {
  addDiag('App iniciada В· '+new Date().toLocaleTimeString('es-ES'));
  addDiag('Worker: '+(WORKER_URL && WORKER_URL!=='YOUR-WORKER-URL' ? WORKER_URL : 'NO CONFIGURADO'));
  var bi = document.getElementById('bankroll-input');
  if (bi) bi.value = BANKROLL;
  renderPage();
  setTimeout(function() {
    runFetch();
  }, 500);
}

// Fire on both events to handle iOS Safari quirks
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  // Already loaded
  init();
}
