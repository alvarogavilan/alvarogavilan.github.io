window.onerror = function(msg, src, line, col, err){
  // Ignorar errores genéricos de scripts externos (cross-origin, ej. OneSignal) — no son de nuestro código y no dan información útil
  if (msg === 'Script error.' && !src) return false;
  document.title = 'ERROR';
  function show(){
    var d = document.createElement('div');
    d.style = 'position:fixed;top:0;left:0;right:0;background:#FF0000;color:#fff;padding:14px;font-size:13px;z-index:99999;font-family:monospace;white-space:pre-wrap';
    d.textContent = 'JS ERROR: ' + msg + '\nLine: ' + line + ':' + col + '\nFile: ' + src;
    document.body.appendChild(d);
  }
  if (document.body) show(); else document.addEventListener('DOMContentLoaded', show);
  return false;
};

<script>

var WORKER_LIVE_URL = 'https://betpro-live.k8mwkbp68y.workers.dev';
var LIVE_MATCHES = [];
var LIVE_DETAIL = null;
var LIVE_LOADING = false;
var LIVE_ERROR = null;

var LIVE_LAST_FETCH = 0;
var LIVE_TOP = null;
var LIVE_TOP_LOADING = false;
var LIVE_TOP_ERROR = null;

var LIVE_HIGHVALUE = null;
var LIVE_TOP_DEBUG = null;

async function fetchTopForecasts(){
  LIVE_TOP_LOADING = true; LIVE_TOP_ERROR = null;
  go('live');
  try {
    var r = await fetch(WORKER_LIVE_URL+'/live/top');
    var j = await r.json();
    if (j && j.error) { LIVE_TOP_ERROR = j.error; LIVE_TOP = []; LIVE_HIGHVALUE = []; }
    else {
      LIVE_TOP = Array.isArray(j.top) ? j.top : [];
      LIVE_HIGHVALUE = Array.isArray(j.highValue) ? j.highValue : [];
      LIVE_TOP_DEBUG = j.debug || null;
    }
  } catch(e){
    LIVE_TOP_ERROR = 'No se pudo calcular el ranking ahora mismo.';
    LIVE_TOP = []; LIVE_HIGHVALUE = [];
  }
  LIVE_TOP_LOADING = false;
  if(PG==='live') go('live');
}

var SERVER_LOG = null;
var SERVER_LOG_LOADING = false;
var SERVER_SIGNAL_STATS = {};

async function fetchServerHistory(){
  SERVER_LOG_LOADING = true; go('history');
  try {
    var r = await fetch(WORKER_LIVE_URL+'/live/history');
    var j = await r.json();
    SERVER_LOG = Array.isArray(j.log) ? j.log : [];
    SERVER_SIGNAL_STATS = j.signalStats || {};

  SERVER_LOG_LOADING = false; go('history');
}

async function fetchLiveMatches(){
  LIVE_LOADING = true; LIVE_ERROR = null;
  LIVE_LAST_FETCH = Date.now();
  try {
    var r = await fetch(WORKER_LIVE_URL+'/live/list?sport=football');
    var j = await r.json();
    if (j && j.error) { LIVE_ERROR = j.error; LIVE_MATCHES = []; }
    else { LIVE_MATCHES = Array.isArray(j) ? j : []; }
  } catch(e){
    LIVE_ERROR = 'No se pudo conectar con el servidor de directos.';
    LIVE_MATCHES = [];
  }
  LIVE_LOADING = false;
  if(PG==='live') go('live');
}

async function openLiveMatch(id, sport){
  LIVE_DETAIL = {loading:true, id:id, sport:sport};
  go('live');
  try {
    var r = await fetch(WORKER_LIVE_URL+'/live/match?id='+id+'&sport='+sport);
    var j = await r.json();
    LIVE_DETAIL = j.error ? {error:j.error} : Object.assign({loading:false}, j);
  } catch(e){
    LIVE_DETAIL = {error:'Error al cargar el detalle del partido.'};
  }
  if(PG==='live') go('live');
}

function closeLiveDetail(){ LIVE_DETAIL=null; go('live'); }

  if (LIVE_DETAIL.realOdds && LIVE_DETAIL.realOdds.bets && LIVE_DETAIL.realOdds.bets.length) {

function timeStr(){
  var d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');
}
function todayStr(){
  var d=new Date();
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
}

// ============================================================
// MATH — Kelly + Stake
// ============================================================
function kelly(conf, odds){
  var p=conf/100, o=parseFloat(odds)||2;
  var k=(p*(o-1)-(1-p))/(o-1);
  return Math.max(0, Math.min(k*0.25, 0.05));
}
function getStk(conf, odds){
  if(!ST.bank||ST.bank<=0) return null;
  var k=kelly(conf, odds);
  return k>0 ? Math.max(0.50, Math.round(ST.bank*k*100)/100) : null;
}
function getPot(stake, odds){
  return stake*(parseFloat(odds)-1);
}

// ============================================================
// EVENT STATUS
// ============================================================
function eventStatus(p){
  if(p.isLive) return 'live';
  if(p.isPast) return 'passed';
  var ref = p.ko ? new Date(p.ko) : new Date();
  var diff = (new Date()-ref)/60000;
  if(diff>110) return 'passed';
  if(diff<0)   return 'future';
  return 'live';
}
function statusBadge(p){
  var st=eventStatus(p);
  var ref = p.ko ? new Date(p.ko) : new Date();
  var fullDate = ref.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  var fullTime = ref.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  if(st==='live')
    return '<span class="livebadge"><span class="ld"></span>LIVE '+(p.liveMin||'')+'</span>';
  if(st==='passed')
    return '<span class="passedbadge">✓ FIN '+fullDate+' '+fullTime+'h</span>';
  return '<span class="futurebadge">🕐 '+fullDate+' · '+fullTime+'h</span>';
}

// ============================================================
// ODDS DISPLAY
// ============================================================
function altOdds(mainOdds, seed){
  var o=parseFloat(mainOdds);
  if(!o||o<=1) return o.toFixed(2);
  if(o<1.30) return Math.max(1.01,o-0.03).toFixed(2);
  if(o<1.50) return (o+(seed%2===0?0.03:-0.02)).toFixed(2);
  if(o<2.00) return (o+(seed%2===0?0.05:0.00)).toFixed(2);
  if(o<3.00) return (o+(seed%2===0?0.08:-0.05)).toFixed(2);
  if(o<5.00) return (o+(seed%2===0?0.12:-0.10)).toFixed(2);
  return (o+(seed%2===0?0.20:-0.15)).toFixed(2);
}
function oddsRow(p,idx){
  var b365=parseFloat(p.odds); var wmax=parseFloat(altOdds(p.odds,idx||0));
  var c=b365<1.50?'#FFD600':'#F0F2F7';
  return '<div style="display:flex;gap:8px;margin-bottom:10px">'
    +'<div style="flex:1;background:#0B0E15;border:1.5px solid rgba(0,212,255,.25);border-radius:10px;padding:9px 10px;text-align:center">'

    +'</div>'

}

function isConf(id){ return !!(ST.confirmed && ST.confirmed[id]); }
function doConf(id,p){
  var s=getStk(p.conf,p.odds)||1;
  if(!ST.hist) ST.hist=[];
  if(!ST.confirmed) ST.confirmed={};
  if(!ST.confirmed[id]){
    ST.confirmed[id]=true;
    ST.hist.push({id:id+(Date.now()),sport:p.sport,match:p.match,pick:p.pick,
      odds:p.odds,bookie:p.bookie||'Bet365',stake:s,result:'pending',profit:0,
      date:todayStr()});
  }
  saveST(); updPin(); updSub();
}
function doUnconf(id){
  if(ST.confirmed) delete ST.confirmed[id];
  saveST(); updPin(); updSub();
}
function togglePick(id){
  if(isConf(id)){ doUnconf(id); } else {
    var found=null;
    ALL_EVENTS.forEach(function(p){ if(p.id===id)found=p; });
    if(found) doConf(id,found);
  }
  if(PG==='home'||PG==='live'||PG==='esports'||PG==='horses'||
     PG==='tennis'||PG==='stats'||PG==='highOdds'||PG==='allsport') go(PG);
}
var _expOpen={};
function doTogglePick(btn){
  var id=btn.getAttribute('data-pickid');
  if(id) togglePick(id);
}
function toggleExp(btn){
  var id=btn.getAttribute('data-pid');
  _expOpen[id]=!_expOpen[id];
  var el=document.getElementById('exp-'+id);
  if(el) el.style.display=_expOpen[id]?'block':'none';
  btn.textContent=(_expOpen[id]?'▲ ':'▼ ')+'Ver análisis y razonamiento';
}
function settle(id,res){
  ST.hist=ST.hist.map(function(h){
    if(h.id!==id)return h;
    var pr=res==='won'?Math.round(h.stake*(parseFloat(h.odds)-1)*100)/100:res==='lost'?-h.stake:0;
    return Object.assign({},h,{result:res,profit:pr});
  });
  var pnl=ST.hist.filter(function(h){return h.result&&h.result!=='pending';}).reduce(function(a,h){return a+(h.profit||0);},0);
  ST.bank=(ST.startBank||0)+pnl;
  saveST(); updPin(); updSub(); go('history');
}
function doSettle(btn,res){
  var id=btn.getAttribute('data-id');
  if(id) settle(id,res);
}
function buildWhy(p){
  var c=p.conf,o=parseFloat(p.odds);
  var ev=c>0&&o>1?(c/100*o).toFixed(2):'—';
  var txt='<strong style="color:#F0F2F7">'+p.match+'</strong> — <span style="color:#00D4FF">'+p.pick+'</span>. ';
  if(c>=75) txt+='Alta confianza del '+c+'% respaldada por múltiples modelos. ';
  else if(c>=65) txt+='Confianza media-alta del '+c+'% con buena relación riesgo/beneficio. ';
  else txt+='Confianza del '+c+'%. Pick con valor en la cuota ofrecida. ';
  txt+='La cuota '+o.toFixed(2)+' genera un valor esperado de '+ev+'x. ';
  if(p.tipster) txt+='Recomendado por <strong style="color:#FFD600">'+p.tipster+'</strong>. ';
  if(o>=15) txt+='<span style="color:#FFD600">Cuota alta: máximo 1-2% de banca (micro-stake).</span>';
  else if(o>=3) txt+='Stake moderado: 2-3% de banca recomendado.';
  else txt+='Stake estándar Kelly calculado automáticamente.';
  return txt;
}

function translateTeam(name){ return COUNTRY_ES[name] || name; }

function mapWorkerPick(p){
  var emoji = (p.sport||'').split(' ')[0] || '🎯';
  var cat = 'live';
  if (emoji === '🎾') cat = 'tennis';
  else if (emoji === '🎮') cat = 'esports';
  var pickName = (p.pick === 'Draw') ? 'Empate' : translateTeam(p.pick);
  var matchTranslated = (p.match||'').split(' vs ').map(translateTeam).join(' vs ');
  return {
    id: p.id,
    cat: cat,
    sport: emoji,
    sl: p.comp || (p.sport||'').replace(emoji,'').trim(),
    ko: p.commenceTime || new Date().toISOString(),
    match: matchTranslated,
    comp: p.comp,
    pick: pickName + ' (' + (p.market||'1X2') + ')',
    market: p.market || '1X2',
    odds: p.odds,
    conf: p.conf,
    bookie: p.bookie,
    tipster: 'BetPro AI Engine · EV+ ' + p.ev,
    hot: p.conf >= 80,
    note: p.note
  };
}

function loadWorkerPicks(){
  fetch(WORKER_URL, {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(Array.isArray(data) && data.length>0){
        var bestByMatch={};
        data.forEach(function(p){
          if(!bestByMatch[p.match] || p.conf>bestByMatch[p.match].conf) bestByMatch[p.match]=p;
        });
        ALL_EVENTS = Object.values(bestByMatch).map(mapWorkerPick);
        workerConnected = true;
        lastWorkerUpdate = new Date();
        lastPicksCount = data.length;
      } else {
        ALL_EVENTS = FALLBACK_EVENTS.slice();
        workerConnected = false;
        lastWorkerUpdate = new Date();
        lastPicksCount = 0;
      }
      if(typeof autoUpdate==='function') autoUpdate();
      updEngineBadge();
    })
    .catch(function(){
      ALL_EVENTS = FALLBACK_EVENTS.slice();
      workerConnected = false;
      updEngineBadge();
    });
}

function updEngineBadge(){
  var el=document.getElementById('engineBadge');
  if(!el) return;
  var now=new Date();
  var nowStr=now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'})+' '
    +now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var upd = lastWorkerUpdate
    ? lastWorkerUpdate.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
    : '—';
  if(workerConnected){
    el.innerHTML='🟢 Motor automático activo · '+lastPicksCount+' picks detectados<br><span style="font-weight:500;color:#5A6785">Hoy '+nowStr+' · últ. actualización '+upd+'</span>';
  } else {
    el.innerHTML='🟡 Sin picks de valor ahora (EV+ mínimo 4%) · mostrando ejemplos<br><span style="font-weight:500;color:#5A6785">Hoy '+nowStr+' · últ. intento '+upd+'</span>';
  }
}


// ============================================================
// ENRICH — compute live/future/passed from device clock
// ============================================================
function enrichPick(p){
  var ko=new Date(p.ko); var now=new Date(); var diff=(now-ko)/60000;
  var cp=Object.assign({},p);
  if(diff>=0&&diff<=110){cp.isLive=true;cp.isPast=false;cp.liveMin=Math.min(Math.floor(diff),90)+"'";}
  else if(diff>110){cp.isLive=false;cp.isPast=true;cp.liveMin=null;}
  else{cp.isLive=false;cp.isPast=false;cp.liveMin=null;}
  cp.time=ko.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  cp.koDate=ko.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
  return cp;
}
function getByStatus(cat,status){
  return ALL_EVENTS.filter(function(p){return !cat||p.cat===cat;}).map(enrichPick).filter(function(p){return status==='all'||eventStatus(p)===status;});
}
function buildLivePicks(){return ALL_EVENTS.filter(function(p){return p.cat==='live'||p.cat==='stats'||p.cat==='tennis';}).map(enrichPick);}
function buildESPicks(){return ALL_EVENTS.filter(function(p){return p.cat==='esports';}).map(enrichPick);}
function buildAllPicks(){var seen={};return ALL_EVENTS.filter(function(p){return p.cat==='live';}).map(enrichPick).filter(function(p){if(seen[p.match])return false;seen[p.match]=true;return true;});}
function buildTennisPicks(){return ALL_EVENTS.filter(function(p){return p.cat==='tennis';}).map(enrichPick);}
function buildStatsPicks(){return ALL_EVENTS.filter(function(p){return p.cat==='stats';}).map(enrichPick);}
function getHOPicks(){return ALL_EVENTS.filter(function(p){return p.odds && parseFloat(p.odds)>=5;}).map(enrichPick);}
function getTop5(){
  var seen={};
  return ALL_EVENTS.map(enrichPick).filter(function(p){
    var st=eventStatus(p);
    if(st==='passed')return false;
    if(seen[p.id])return false;
    seen[p.id]=true;return true;
  }).sort(function(a,b){return(b.conf*0.7+10/parseFloat(b.odds))-(a.conf*0.7+10/parseFloat(a.odds));}).slice(0,5);
}

function tipCard(t,i,col,sortBy){
  var val=sortBy==='roi'?'+'+t.roi+'% ROI':sortBy==='lr'?t.lr+'% pérd':t.wr+'% WR';
  var valCol=sortBy==='lr'?(t.lr<40?'#00FF87':t.lr<43?'#00D4FF':t.lr<45?'#FFD600':'#FF6B00'):'#00FF87';
  var stk=ST.bank>0&&t.wr?getStk(t.wr,t.avgOdds||1.85):null;
  return '<div class="spec" style="'+(i<3?'border-color:'+col+'55':'')+'">'
    +'<div class="spr"><div class="sprk" style="background:'+col+'22;border-color:'+col+';color:'+col+'">'+(t.rank||i+1)+'</div>'
    +'<div style="flex:1;min-width:0"><div style="font-weight:700;color:#F0F2F7;font-size:13px">'+(t.n||'')+(t.c?' '+t.c:'')+'</div>'
    +'<div style="font-size:11px;color:#6B7490">'+(t.sp||'')+(t.m?' · '+t.m:'')+'</div>'
    +(t.d?'<div style="font-size:10px;color:#BCC5D9;margin-top:2px;line-height:1.4">'+t.d+'</div>':'')
    +'</div><div style="text-align:right;flex-shrink:0"><div style="color:'+valCol+';font-weight:900;font-size:15px">'+val+'</div>'
    +(sortBy!=='roi'?'<div style="color:#00FF87;font-size:11px">+'+t.roi+'%</div>':'')
    +'</div></div>'

function bankSparkline(settled,startBank){
  if(settled.length<2) return '';
  var points=[startBank];
  var run=startBank;
  settled.slice().reverse().forEach(function(h){ run+=(h.profit||0); points.push(run); });
  var w=300,hh=60,pad=4;
  var min=Math.min.apply(null,points), max=Math.max.apply(null,points);
  var range=(max-min)||1;
  var step=(w-pad*2)/(points.length-1);
  var path=points.map(function(v,i){
    var x=pad+i*step, y=hh-pad-((v-min)/range)*(hh-pad*2);
    return (i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  var up=points[points.length-1]>=points[0];
  var color=up?'#00FF87':'#FF3B5C';
  return '<div style="margin-top:10px"><svg viewBox="0 0 '+w+' '+hh+'" style="width:100%;height:60px;display:block">'
    +'<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    +'</svg><div style="font-size:10px;color:#5A6785;text-align:center;margin-top:2px">Evolución de banca · últimos '+points.length+' picks liquidados</div></div>';
}

        +'<div style="background:#060A0E;border-left:3px solid #00FF87;padding:8px 10px;border-radius:0 8px 8px 0;font-size:12px;color:#C0CCE0;line-height:1.6">🤖 <strong style="color:#00FF87">Mi decisión:</strong> '+s.botDecision+'</div>'
        +'</div>'
        +'<div style="text-align:center;flex-shrink:0;background:rgba(0,255,135,.08);border:2px solid rgba(0,255,135,.3);border-radius:11px;padding:7px 10px;min-width:54px">'
        +'<div style="color:#00FF87;font-weight:900;font-size:20px;line-height:1">'+s.confidence+'%</div>'
        +'<div style="color:#5A6785;font-size:9px;margin-top:1px">CONF</div>'
        +'</div></div>'
        +(s.oddsB365||s.oddsWmax?'<div style="display:flex;gap:7px;margin-bottom:7px">'
          +(s.oddsB365?'<div style="flex:1;background:#060810;border:1.5px solid rgba(0,212,255,.3);border-radius:8px;padding:6px;text-align:center"><div style="font-size:9px;color:#00D4FF;font-weight:700;margin-bottom:2px">BET365</div><div style="font-size:22px;font-weight:900;color:#FFD600">'+s.oddsB365+'</div></div>':'')
          +(s.oddsWmax?'<div style="flex:1;background:#060810;border:1.5px solid rgba(255,107,0,.3);border-radius:8px;padding:6px;text-align:center"><div style="font-size:9px;color:#FF6B00;font-weight:700;margin-bottom:2px">WINAMAX</div><div style="font-size:22px;font-weight:900;color:#FFD600">'+s.oddsWmax+'</div></div>':'')
          +'</div>':'')
        +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
        +'<span style="font-size:11px;color:#5A6785">Mercado:</span>'
        +'<span style="font-size:11px;color:#F0F2F7;font-weight:700">'+s.market+'</span>'
        +'<span style="font-size:12px;font-weight:900;color:'+(s.oddsDir==='down'?'#FF3B5C':'#00FF87')+'">'+s.oddsFrom+' → '+s.oddsTo+' '+(s.oddsDir==='down'?'▼':'▲')+'</span>'
        +(stake?'<span style="margin-left:auto;font-size:14px;font-weight:900;color:#F0F2F7">'+stake.toFixed(2)+'€</span>':'')
        +'</div></div>';
    });
  }

  if(watchNow.length){
    h+='<div style="font-size:10px;color:#FFD600;font-weight:800;letter-spacing:.8px;margin-bottom:8px;margin-top:4px">👁 ESTAS LAS VIGILARÍA DE CERCA</div>';
    watchNow.forEach(function(s){
      h+='<div style="background:#0A0D12;border:1px solid rgba(255,214,0,.2);border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px">'
        +'<span style="font-size:18px;flex-shrink:0">'+s.sport+'</span>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:12px;font-weight:700;color:#F0F2F7">'+s.match+'</div>'
        +'<div style="font-size:11px;color:#FFD600;margin-top:2px">'+s.signal+'</div>'
        +'<div style="font-size:11px;color:#5A6785;margin-top:3px">🤖 '+s.botDecision+'</div>'
        +(s.oddsB365?'<div style="display:flex;gap:6px;margin-top:5px">'
          +'<span style="background:#0B0E15;border:1px solid rgba(0,212,255,.25);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:800;color:#FFD600">B365: '+s.oddsB365+'</span>'
          +(s.oddsWmax?'<span style="background:#0B0E15;border:1px solid rgba(255,107,0,.25);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:800;color:#FFD600">WIN: '+s.oddsWmax+'</span>':'')
          +'</div>':'')
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:900;color:#FFD600">'+s.confidence+'%</div></div>'
        +'</div>';
    });
  }

  h+='</div>';

  // ── EV+ VALUE BETS ──────────────────────────────────────
  var vbAll=VALUE_BETS.map(function(v){var ko=new Date(v.ko);var diff=(now-ko)/60000;return Object.assign({},v,{isPast:diff>110,timeStr:ko.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),dateStr:ko.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})});});
  var vbActive=vbAll.filter(function(v){return!v.isPast;}).sort(function(a,b){return b.evNum-a.evNum;});
  var vbPassed=vbAll.filter(function(v){return v.isPast;});

  h+='<div style="margin-top:16px;margin-bottom:6px">'
    +'<div style="font-size:10px;color:#00FF87;font-weight:800;letter-spacing:1.2px;margin-bottom:4px">📊 VALOR ESPERADO POSITIVO (EV+)</div>'
    +'<div style="font-size:20px;font-weight:900;color:#F0F2F7;margin-bottom:4px">Cuotas con valor matemático</div>'
    +'<div style="font-size:12px;color:#5A6785">Comparamos cuota ofrecida vs probabilidad real del modelo</div>'
    +'</div>';

  var topEV=vbActive.slice(0,3);
  if(topEV.length){
    h+='<div style="background:#060E08;border:2px solid rgba(0,255,135,.3);border-radius:14px;padding:13px;margin-bottom:13px">'
      +'<div style="font-size:10px;color:#00FF87;font-weight:800;letter-spacing:.8px;margin-bottom:10px">🏆 MAYOR EV+ DEL DÍA</div>';
    topEV.forEach(function(v,i){
      var stake=ST.bank>0?Math.max(0.5,Math.round(ST.bank*kelly(v.probReal,v.oddsBookie)*100)/100):null;
      h+='<div style="background:#0B1510;border:1px solid rgba(0,255,135,.15);border-radius:11px;padding:11px 12px;margin-bottom:'+(i<2?'8px':'0')+'">'
        +'<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:7px">'
        +'<span style="font-size:18px;flex-shrink:0">'+v.sport+'</span>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:13px;font-weight:800;color:#F0F2F7;margin-bottom:2px">'+v.match+'</div>'
        +'<div style="font-size:11px;color:#00D4FF;font-weight:700;margin-bottom:1px">'+v.pick+'</div>'
        +'<div style="font-size:10px;color:#5A6785">'+v.market+' · '+v.timeStr+'h '+v.dateStr+'</div>'
        +'</div>'
        +'<div style="text-align:center;flex-shrink:0;background:rgba(0,255,135,.1);border:2px solid #00FF87;border-radius:10px;padding:5px 9px;min-width:60px">'
        +'<div style="color:#00FF87;font-weight:900;font-size:18px;line-height:1">'+v.ev+'</div>'
        +'<div style="color:#5A6785;font-size:8px;font-weight:700;margin-top:1px">EV+</div>'
        +'</div></div>'
        +'<div style="display:flex;gap:7px;margin-bottom:7px">'
        +'<div style="flex:1;background:#0D1118;border:1.5px solid rgba(0,212,255,.25);border-radius:8px;padding:7px;text-align:center">'
        +'<div style="font-size:9px;color:#00D4FF;font-weight:700;margin-bottom:2px">'+v.bookie.toUpperCase()+'</div>'
        +'<div style="font-size:24px;font-weight:900;color:#FF6B00">'+v.oddsBookie.toFixed(2)+'</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;font-size:14px;color:#5A6785;font-weight:700;padding:0 4px">vs</div>'
        +'<div style="flex:1;background:#0D1118;border:1.5px solid rgba(107,116,144,.2);border-radius:8px;padding:7px;text-align:center">'
        +'<div style="font-size:9px;color:#5A6785;font-weight:700;margin-bottom:2px">CUOTA JUSTA</div>'
        +'<div style="font-size:24px;font-weight:900;color:#8896AA">'+v.oddsFair.toFixed(2)+'</div>'
        +'</div>'
        +'<div style="flex:1;background:#0B1510;border-radius:8px;padding:7px">'
        +'<div style="font-size:9px;color:#5A6785;font-weight:700;margin-bottom:2px">PROB. REAL</div>'
        +'<div style="font-size:16px;font-weight:900;color:#00FF87">'+v.probReal+'%</div>'
        +'<div style="font-size:9px;color:#5A6785">vs '+v.probImplied+'% impl.</div>'
        +'</div></div>'
        +'<div style="font-size:12px;color:#8896AA;line-height:1.6;margin-bottom:'+(stake?'8px':'0')+'">'+v.note+'</div>'
        +(stake?'<div style="display:flex;justify-content:space-between;align-items:center;background:#060E08;border-radius:8px;padding:8px 10px">'
          +'<div><div style="font-size:9px;color:#5A6785;font-weight:700;margin-bottom:2px">STAKE KELLY</div>'
          +'<div style="font-size:22px;font-weight:900;color:#F0F2F7">'+stake.toFixed(2)+'€</div></div>'
          +'<div style="text-align:right"><div style="font-size:10px;color:#5A6785;margin-bottom:2px">ganancia potencial</div>'
          +'<div style="font-size:18px;font-weight:900;color:#00FF87">+'+(stake*(v.oddsBookie-1)).toFixed(2)+'€</div></div></div>':'')
        +'</div>';
    });
    h+='</div>';
  }

  var restEV=vbActive.slice(3);
  if(restEV.length){
    h+='<div style="font-size:10px;color:#5A6785;font-weight:800;letter-spacing:.8px;margin-bottom:8px">MÁS CUOTAS CON VALOR</div>';
    restEV.forEach(function(v){
      h+='<div style="background:#0B0E15;border:1px solid rgba(0,255,135,.12);border-radius:11px;padding:10px 12px;margin-bottom:8px">'
        +'<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:5px">'
        +'<div style="flex:1;min-width:0"><div style="font-size:10px;color:#5A6785;margin-bottom:2px">'+v.sport+' · '+v.comp+' · '+v.timeStr+'h '+v.dateStr+'</div>'
        +'<div style="font-size:13px;font-weight:800;color:#F0F2F7;margin-bottom:2px">'+v.match+'</div>'
        +'<div style="font-size:12px;color:#00D4FF;font-weight:700">'+v.pick+'</div></div>'
        +'<div style="text-align:center;flex-shrink:0;background:rgba(0,255,135,.08);border:1.5px solid rgba(0,255,135,.3);border-radius:9px;padding:5px 8px;min-width:55px">'
        +'<div style="color:#00FF87;font-weight:900;font-size:16px;line-height:1">'+v.ev+'</div>'
        +'<div style="color:#5A6785;font-size:8px;font-weight:700">EV+</div>'
        +'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
        +'<span style="font-size:10px;color:#5A6785">'+v.bookie+':</span>'
        +'<span style="font-size:18px;font-weight:900;color:#FF6B00">'+v.oddsBookie+'</span>'
        +'<span style="font-size:11px;color:#5A6785">→ justo:</span>'
        +'<span style="font-size:18px;font-weight:900;color:#8896AA">'+v.oddsFair+'</span>'
        +'<span style="font-size:10px;color:#5A6785">Prob:</span>'
        +'<span style="font-size:13px;font-weight:800;color:#00FF87">'+v.probReal+'%</span>'
        +'</div>'
        +'<div style="font-size:11px;color:#8896AA;line-height:1.6">'+v.note+'</div>'
        +'</div>';
    });
  }

  if(vbPassed.length){
    h+='<div style="opacity:.4;margin-top:4px"><div style="font-size:10px;color:#5A6785;font-weight:700;margin-bottom:6px">✓ FINALIZADOS</div>';
    vbPassed.forEach(function(v){
      h+='<div style="background:#0B0E15;border:1px solid #1A2235;border-radius:9px;padding:8px 11px;margin-bottom:6px;display:flex;justify-content:space-between">'
        +'<div><div style="font-size:11px;color:#3A4560;font-weight:700">'+v.sport+' '+v.match+'</div>'
        +'<div style="font-size:10px;color:#3A4560">'+v.pick+'</div></div>'
        +'<div style="font-size:13px;font-weight:900;color:#3A4560">'+v.ev+'</div></div>';
    });
    h+='</div>';
  }

  // All signals by sport
  h+='<div style="margin-top:16px;font-size:10px;color:#5A6785;font-weight:800;letter-spacing:1px;margin-bottom:12px;text-align:center">― TODAS LAS SEÑALES DETECTADAS ―</div>';
  var sports=[...new Set(SM_SIGNALS.map(function(s){return s.sport;}))];
  var sportNames={'⚽':'Fútbol','🏀':'Baloncesto','🎾':'Tenis','🏇':'Caballos','🎮':'Esports','🏓':'Ping Pong'};
  sports.forEach(function(sport){
    var sp_signals=signals.filter(function(s){return s.sport===sport;});
    var sp_active=sp_signals.filter(function(s){return!s.isPast;});
    var sp_passed=sp_signals.filter(function(s){return s.isPast;});
    if(!sp_signals.length)return;
    h+='<div style="font-size:11px;color:#F0F2F7;font-weight:800;margin-bottom:8px;margin-top:6px">'+sport+' '+(sportNames[sport]||'')+'</div>';
    sp_active.forEach(function(s){
      var col=typeCol[s.cat]||'#6B7490';
      var lbl=typeLbl[s.cat]||'SEÑAL';
      var stBadge=s.isLive?'<span class="livebadge"><span class="ld"></span>LIVE</span>':'<span class="futurebadge">🕐 '+s.timeStr+'h '+s.dateStr+'</span>';
      h+='<div class="sm-alert" style="border-color:'+col+'44">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:9px;color:'+col+';font-weight:800;letter-spacing:.6px;margin-bottom:3px">'+lbl+'</div>'
        +'<div style="font-size:14px;font-weight:800;color:#F0F2F7;margin-bottom:2px">'+s.match+'</div>'
        +'<div style="font-size:10px;color:#5A6785;margin-bottom:5px">'+s.comp+'</div>'
        +stBadge+'</div>'
        +'<div style="text-align:center;flex-shrink:0;background:'+col+'12;border:2px solid '+col+';border-radius:10px;padding:5px 8px;min-width:50px">'
        +'<div style="color:'+col+';font-weight:900;font-size:18px;line-height:1">'+s.confidence+'%</div>'
        +'<div style="color:'+col+';font-size:8px;font-weight:700;margin-top:1px">CONF</div>'
        +'</div></div>'
        +'<div style="font-size:12px;color:#FFD600;font-weight:700;margin-bottom:5px">📡 '+s.signal+'</div>'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">'
        +'<span style="font-size:13px;font-weight:900;color:#8896AA">'+s.oddsFrom+'</span>'
        +'<span style="color:#5A6785">→</span>'
        +'<span style="font-size:13px;font-weight:900;color:'+(s.oddsDir==='down'?'#FF3B5C':'#00FF87')+'">'+s.oddsTo+' '+(s.oddsDir==='down'?'▼':'▲')+'</span>'
        +(s.oddsB365?'<span style="background:#0B0E15;border:1px solid rgba(0,212,255,.25);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:800;color:#FFD600">B365: '+s.oddsB365+'</span>':'')
        +(s.oddsWmax?'<span style="background:#0B0E15;border:1px solid rgba(255,107,0,.25);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:800;color:#FFD600">WIN: '+s.oddsWmax+'</span>':'')
        +'<span style="font-size:10px;color:#5A6785">'+s.market+'</span>'
        +'</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'
        +s.evidencias.map(function(e){return'<span style="background:#0B0E15;border:1px solid #252D3D;color:#8896AA;font-size:10px;border-radius:5px;padding:2px 7px">◆ '+e+'</span>';}).join('')
        +'</div>'
        +'<div style="background:#060A0E;border-left:3px solid '+col+';border-radius:0 9px 9px 0;padding:9px 11px">'
        +'<div style="font-size:10px;color:'+col+';font-weight:700;margin-bottom:3px">🤖 DECISIÓN DEL BOT</div>'
        +'<div style="font-size:12px;color:#C0CCE0;line-height:1.6;font-weight:600">'+s.botDecision+'</div>'
        +'</div></div>';
    });
    if(sp_passed.length){
      h+='<div style="opacity:.45;margin-bottom:4px">';
      sp_passed.forEach(function(s){
        h+='<div style="background:#0B0E15;border:1px solid #1A2235;border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">'
          +'<div><div style="font-size:12px;color:#5A6785;font-weight:700">✓ Finalizado · '+s.match+'</div>'
          +'<div style="font-size:11px;color:#3A4560;margin-top:2px">'+s.signal+'</div></div>'
          +'<span style="font-size:11px;color:#3A4560;font-weight:700">'+s.confidence+'%</span></div>';
      });
      h+='</div>';
    }
  });

  h+='<div style="background:#0B0E15;border:1px solid #1A2235;border-radius:11px;padding:11px 13px;margin-top:6px">'
    +'<div style="font-size:10px;color:#FFD600;font-weight:700;margin-bottom:5px">⚠️ AVISO IMPORTANTE</div>'
    +'<div style="font-size:11px;color:#5A6785;line-height:1.65">El smart money no garantiza resultados. Los sindicatos pueden equivocarse. Nunca superes el 2-3% de banca en señales de smart money. +18 · Apuesta responsablemente.</div></div>';
  return h;
}

// ============================================================
// AUTO-UPDATE + INIT
// ============================================================
function autoUpdate(){
  LIVE_PICKS=buildLivePicks(); ES_PICKS=buildESPicks(); ALL_PICKS=buildAllPicks();
  if(PG==='tennis')TENNIS_PICKS=buildTennisPicks();
  if(PG==='stats')STATS_PICKS=buildStatsPicks();
  var lv=LIVE_PICKS.filter(function(p){return eventStatus(p)==='live';}).length;
  var el=document.getElementById('lcnt'); if(el)el.textContent=lv+' live';
  var rd=document.getElementById('rdot'); if(rd)rd.classList.toggle('on',lv>0);
  if(PG==='live'||PG==='esports'||PG==='home'||PG==='tennis'||PG==='stats'||PG==='smartmoney')go(PG);
  updSub();
}

document.addEventListener('DOMContentLoaded',function(){
  setInterval(function(){var c=document.getElementById('clk');if(c)c.textContent=timeStr();},1000);
  go('live');
  updPin(); updSub();
});

</script>
